<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="像素风桌游店：七位常驻角色各有作息，猫会自己溜达，进度存本地。">
<meta name="color-scheme" content="light dark">
<title>BBG Boardgame — 桌游店</title>

<style>
  :root {
    --ground:   #e3e0d5;
    --ink:      #23201a;
    --ink-soft: #5c574a;
    --ink-faint:#8a8474;
    --rule:     #b3ae9c;
    --amber:    #b5761c;
    --amber-lit:#e8a33d;
    --frame:    #6b4226;
    --shadow:   rgba(35,32,26,.18);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ground:#171512; --ink:#ded6c6; --ink-soft:#a49b88; --ink-faint:#6f6858;
      --rule:#3a342b; --amber:#e8a33d; --amber-lit:#ffc978; --frame:#3d2716;
      --shadow:rgba(0,0,0,.5);
    }
  }
  :root[data-theme="dark"] {
    --ground:#171512; --ink:#ded6c6; --ink-soft:#a49b88; --ink-faint:#6f6858;
    --rule:#3a342b; --amber:#e8a33d; --amber-lit:#ffc978; --frame:#3d2716;
    --shadow:rgba(0,0,0,.5);
  }
  :root[data-theme="light"] {
    --ground:#e3e0d5; --ink:#23201a; --ink-soft:#5c574a; --ink-faint:#8a8474;
    --rule:#b3ae9c; --amber:#b5761c; --amber-lit:#e8a33d; --frame:#6b4226;
    --shadow:rgba(35,32,26,.18);
  }

  body {
    background: var(--ground);
    color: var(--ink);
    font: 400 15px/1.6 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    padding: clamp(14px, 2.4vw, 34px);
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; gap: 18px; }

  header { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px 18px; }
  h1 {
    font: 700 clamp(28px, 4vw, 46px)/1 Georgia, "Iowan Old Style", "Palatino Linotype", serif;
    letter-spacing: -.015em; text-wrap: balance;
  }
  h1 .amp { color: var(--amber); font-style: italic; }
  /* Welcome to 压小一档，主角还是店名 */
  h1 .welcome { color: var(--ink-soft); font-weight: 400; font-size: .58em; letter-spacing: .01em; }
  .tagline { color: var(--ink-soft); font-size: 13px; letter-spacing: .04em; }
  .openlamp {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
    color: var(--amber); margin-left: auto;
  }
  .openlamp i {
    width: 8px; height: 8px; background: var(--amber-lit); display: block;
    box-shadow: 0 0 8px var(--amber-lit); animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: .45 } 50% { opacity: 1 } }

  .screen {
    border: 3px solid var(--frame); background: #241c14; padding: 6px;
    box-shadow: 0 14px 34px -14px var(--shadow); overflow: hidden;
    position: relative;
  }
  canvas { display: block; width: 100%; height: auto; image-rendering: pixelated; image-rendering: crisp-edges; }

  /* 点击地形图弹出的放大图层 */
  .mapzoom {
    position: absolute; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    background: rgba(10, 7, 4, 0); opacity: 0; pointer-events: none;
    transition: opacity .28s ease, background .28s ease;
  }
  .mapzoom.show { opacity: 1; pointer-events: auto; background: rgba(10, 7, 4, .8); cursor: zoom-out; }
  .mapzoom img {
    max-width: 86%; max-height: 86%;
    border: 4px solid var(--frame); border-radius: 6px;
    box-shadow: 0 16px 48px rgba(0, 0, 0, .6);
    transform: scale(.15); opacity: .4;
    transition: transform .34s cubic-bezier(.2, .9, .3, 1.25), opacity .34s ease;
  }
  .mapzoom.show img { transform: scale(1); opacity: 1; }
  @media (prefers-reduced-motion: reduce) { .mapzoom, .mapzoom img { transition: opacity .12s ease; transform: none; } }

  @media (prefers-reduced-motion: reduce) { .openlamp i { animation: none; opacity: .9 } }
</style>

<body>

<div class="wrap">
  <header>
    <h1><span class="welcome">Welcome to</span> BBG <span class="amp">Boardgame</span></h1>
    <p class="tagline">桌游店 · 平面图 · 营业中的一天</p>
    <span class="openlamp"><i></i>Open</span>
  </header>

  <div class="screen">
    <canvas id="stage" width="1280" height="896" role="img"
            aria-label="桌游店俯视平面图，像素风格：中央包间、右上小房间、左下沙发电视区、四面书架墙，顾客自动走动、选游戏、入座开局与结账。"></canvas>
  </div>
</div>

<script>
(() => {
"use strict";

/* ══ 画布 ══════════════════════════════════════════════ */
const TW = 16, GW = 40, GH = 28;
const NW = GW * TW, NH = GH * TW;            // 640 × 448
const SCALE = 2;

const view = document.getElementById("stage");
const vctx = view.getContext("2d");
vctx.imageSmoothingEnabled = false;

const mk = (w, h) => { const c = document.createElement("canvas"); c.width = w; c.height = h; return c; };
const scene = mk(NW, NH), sx = scene.getContext("2d");
const lightC = mk(NW, NH), lx = lightC.getContext("2d");
const floorTex = mk(NW, NH), fx = floorTex.getContext("2d");
sx.imageSmoothingEnabled = false;

/* ══ 调色板 ═══════════════════════════════════════════ */
const C = {
  plank:  ["#a9723f", "#a06a3a", "#b17b47"],
  seam:   "#7d5129",
  rug:    "#6d6d72", rug2: "#8b8b93", rugEdge: "#4a4a4f", rugPat: "#5b5b61",
  wallHi: "#efe0c6", wall: "#e2d0b2", wallLo: "#cbb694",
  wains:  "#7a4a2b", wainsHi: "#96603a",
  shelfW: "#6b4226", shelfHi: "#8a5834", shelfDk: "#4a2c18",
  tableEdge: "#6b4226", tableTop: "#a0703c", tableHi: "#bb8b52", tableLo: "#83592c",
  counter:"#5c3a20", counterTop: "#8a5c33",
  sofa:   "#4a5a6b", sofaHi: "#5f7386", sofaDk: "#33404d",
  pillar: "#8d8778", pillarHi: "#a8a294", pillarDk: "#5f5a4e",
  plant:  "#3f7d4e", plant2: "#56a066", pot: "#a45a3c",
  dark:   "#2a1d12", lamp: "#ffd48a",
};
const SPINE = ["#c94f3d","#e0913a","#e6c34a","#4e9d5c","#3c7fb1","#7a5aa8","#c96a9b","#d8d2c2","#4a6b8a","#b8452f"];
const SKIN  = ["#f2c9a0","#e0aa79","#c88a5c","#9c6440","#7a4a2e","#fadfc0"];
const HAIR  = ["#2c2118","#5a3820","#8c5a2b","#c9a24a","#a83c2c","#4c4a52","#d8d2c2","#3b5b7a"];
const SHIRT = ["#c94f3d","#3c7fb1","#4e9d5c","#e0913a","#7a5aa8","#c96a9b","#2f6b4f","#d8d2c2","#4a6b8a"];
const PANTS = ["#3a4a63","#5a4632","#2f3a33","#6b3f4a","#454049"];

/* ══ 3×5 像素字体 ═════════════════════════════════════ */
const GLYPH = {
  A:"111101111101101", B:"110101110101110", C:"111100100100111", D:"110101101101110",
  E:"111100110100111", F:"111100110100100", G:"111100101101111", H:"101101111101101",
  I:"111010010010111", J:"001001001101111", K:"101101110101101", L:"100100100100111",
  M:"101111111101101", N:"110101101101101", O:"111101101101111", P:"111101111100100",
  Q:"111101101111001", R:"111101111110101", S:"111100111001111", T:"111010010010010",
  U:"101101101101111", V:"101101101101010", W:"101101111111101", X:"101101010101101",
  Y:"101101010010010", Z:"111001010100111",
  0:"111101101101111", 1:"010110010010111", 2:"111001111100111", 3:"111001111001111",
  4:"101101111001001", 5:"111100111001111", 6:"111100111101111", 7:"111001001001001",
  8:"111101111101111", 9:"111101111001111",
  " ":"000000000000000", "&":"110110111101111", ".":"000000000000010",
  "-":"000000111000000", "'":"010010000000000", "!":"010010010000010", "?":"111001010000010",
};
function pxText(ctx, str, x, y, color) {
  ctx.fillStyle = color;
  let cx = x;
  for (const ch of str.toUpperCase()) {
    const g = GLYPH[ch];
    if (g) for (let r = 0; r < 5; r++) for (let c = 0; c < 3; c++)
      if (g[r * 3 + c] === "1") ctx.fillRect(cx + c, y + r, 1, 1);
    cx += 4;
  }
}
const textW = s => s.length * 4 - 1;

/* 放大 + 字距可调的小字，给标题栏用 */
function pxTextS(ctx, str, x, y, color, scale, track) {
  ctx.fillStyle = color;
  let cx = x;
  for (const ch of str.toUpperCase()) {
    const g = GLYPH[ch];
    if (g) for (let r = 0; r < 5; r++) for (let c = 0; c < 3; c++)
      if (g[r * 3 + c] === "1") ctx.fillRect(cx + c * scale, y + r * scale, scale, scale);
    cx += (3 + track) * scale;
  }
}
const textWS = (s, scale, track) => (s.length * (3 + track) - track) * scale;

/* 标题栏专用的粗体大写字，8×10 */
const BIG = {
  B: ["BBBBBB..", "BBBBBBB.", "BB....BB", "BB....BB", "BBBBBBB.",
      "BBBBBBB.", "BB....BB", "BB....BB", "BBBBBBB.", "BBBBBB.."],
  G: [".BBBBBB.", "BBBBBBBB", "BB....BB", "BB......", "BB......",
      "BB..BBBB", "BB..BBBB", "BB....BB", "BBBBBBBB", ".BBBBBB."],
};
function drawBig(ctx, str, x, y, scale, color) {
  for (let i = 0; i < str.length; i++) {
    const g = BIG[str[i]];
    if (!g) continue;
    ctx.fillStyle = color;
    for (let r = 0; r < g.length; r++) for (let c = 0; c < 8; c++)
      if (g[r][c] !== ".") ctx.fillRect(x + i * 11 * scale + c * scale, y + r * scale, scale, scale);
  }
}
const bigW = (s, scale) => (s.length * 11 - 3) * scale;

function pxCircle(ctx, cx, cy, r, color) {
  ctx.fillStyle = color;
  for (let y = -r; y <= r; y++) {
    const w = Math.floor(Math.sqrt(Math.max(0, r * r - y * y)));
    if (w > 0) ctx.fillRect(cx - w, cy + y, w * 2, 1);
  }
}
function pxEllipse(ctx, cx, cy, rx, ry, color) {
  ctx.fillStyle = color;
  for (let y = -ry; y <= ry; y++) {
    const w = Math.floor(rx * Math.sqrt(Math.max(0, 1 - (y * y) / (ry * ry))));
    if (w > 0) ctx.fillRect(cx - w, cy + y, w * 2, 1);
  }
}

/* ══ 地图 ═════════════════════════════════════════════ */
const grid = Array.from({ length: GH }, () => new Uint8Array(GW));
const box = (x, y, w, h, v = 1) => { for (let j = y; j < y + h; j++) for (let i = x; i < x + w; i++)
  if (i >= 0 && j >= 0 && i < GW && j < GH) grid[j][i] = v; };
const walkable = (x, y) => x >= 0 && y >= 0 && x < GW && y < GH && grid[y][x] === 0;

// 外墙
box(0, 0, GW, 2);            // 上（含墙面高度）
box(0, 2, 1, GH - 2);        // 左
box(GW - 1, 2, 1, GH - 2);   // 右
box(0, GH - 1, GW, 1);       // 下
grid[25][GW - 1] = 0; grid[26][GW - 1] = 0;      // 大门（右墙，通向底部走廊）

// 内墙（画成满墙书架）
const IWALL_V = [], IWALL_H = [];
const addIWallV = (x, y, h) => { IWALL_V.push({ x, y, h }); box(x, y, 1, h); };
const addIWallH = (x, y, w) => { IWALL_H.push({ x, y, w }); box(x, y, w, 1); };

addIWallV(12, 2, 12);        // 中央包间 左墙（rows 2–13）· 门在 14–15
addIWallH(12, 16, 8);        // 中央包间 下墙
addIWallV(19, 2, 14);        // 中央包间 右墙（整面封死）
addIWallV(28, 2, 6);         // 东北角 边界墙
addIWallH(23, 7, 6);         // 北厅 下墙（cols 23–28）
addIWallH(22, 24, GW - 22);  // 底部走廊 上墙

// 东北角：不属于店内，整块挖掉
const VOID = { x: 29, y: 0, w: GW - 29, h: 8 };
box(VOID.x, VOID.y, VOID.w, VOID.h);

// 靠墙书架（横向）
const shelves = [];
const addShelf = (x, y, w) => { shelves.push({ x, y, w }); box(x, y, w, 1); };
addShelf(2, 2, 10); addShelf(14, 2, 5); addShelf(20, 2, 8);
addShelf(9, 26, 5); addShelf(24, 26, 13);

// 靠墙书架（竖向）
const wallShelves = [];
const addWallShelf = (x, y, h, dir) => { wallShelves.push({ x, y, h, dir }); box(x, y, 1, h); };
addWallShelf(1, 2, 7, "w"); addWallShelf(1, 14, 5, "w");
addWallShelf(13, 2, 11, "w");            // 包间内侧
addWallShelf(38, 12, 4, "e");   // 缩短，给上方东墙电视让位

// 柱子
const PILLARS = [{ x: 31, y: 8, w: 3, h: 3 }];
PILLARS.forEach(p => box(p.x, p.y, p.w, p.h));

/* ── 桌台 ── */
const GAMES = ["Sunhollow", "Iron Foxes", "Duckbill Bay", "Tavern Tally",
               "Cinderpine", "Long Ferry", "Meeple March", "Moonrise"];
const TABLES = [];
function addTable(x, y, w, h, label) {
  const t = { x, y, w, h, label, chairs: [], game: null, rollT: 0, id: TABLES.length };
  box(x, y, w, h);
  const mx = x + Math.floor(w / 2), my = y + Math.floor(h / 2);   // 短边中点
  const push = (cx, cy, dir) => t.chairs.push({ x: cx, y: cy, dir, by: null, t });
  if (w === h) {                         // 方桌：四边各 1，共 4
    push(mx, y - 1, "s"); push(mx, y + h, "n");
    push(x - 1, my, "e"); push(x + w, my, "w");
  } else {                               // 长桌：两条长边各 2、两条短边各 1，共 6
    const two = n => [1, n - 2];
    if (w > h) {                         // 横向：长边在上下
      for (const i of two(w)) { push(x + i, y - 1, "s"); push(x + i, y + h, "n"); }
      push(x - 1, my, "e"); push(x + w, my, "w");
    } else {                             // 竖向：长边在左右
      for (const j of two(h)) { push(x - 1, y + j, "e"); push(x + w, y + j, "w"); }
      push(mx, y - 1, "s"); push(mx, y + h, "n");
    }
  }
  TABLES.push(t);
}
// 长桌 3×6（含旋转的 6×3）：长边各 2、短边各 1；方桌 3×3：四边各 1
// 北窗桌（北侧小包间）保持 6×2 不变
addTable(3, 4, 6, 3, "左上长桌");
addTable(3, 9, 3, 6, "左墙桌");
addTable(8, 9, 3, 6, "左中桌");
addTable(15, 4, 3, 6, "包间大桌");
addTable(21, 4, 6, 2, "北窗桌");
addTable(13, 18, 6, 3, "厅心长桌");
// 右边东厅六张：全为 3×3 方桌，排成 2×3 网格并对齐
addTable(22, 12, 3, 3, "中庭方桌");
addTable(27, 12, 3, 3, "东厅一桌");
addTable(32, 12, 3, 3, "东厅二桌");
addTable(22, 17, 3, 3, "南厅大桌");
addTable(27, 17, 3, 3, "东南桌");
addTable(32, 17, 3, 3, "角落桌");

/* ── 沙发 / 电视 / 收银 ── */
const SOFAS = [];
function addSofa(x, y, len, dir) {                   // dir = 坐者朝向；东西向朝向 ⇒ 沙发竖排
  const vert = dir === "e" || dir === "w";
  const s = { x, y, len, dir, vert, w: vert ? 1 : len, h: vert ? len : 1, seats: [] };
  box(x, y, s.w, s.h);
  for (let i = 0; i < len; i++)
    s.seats.push({ x: x + (vert ? 0 : i), y: y + (vert ? i : 0), dir, by: null, sofa: s });
  SOFAS.push(s);
}
addSofa(3, 20, 4, "s");        // 正对电视
addSofa(9, 21, 4, "w");        // 竖排，侧对电视，与上一张成 L
addSofa(34, 8, 3, "e");        // 东厅角落，竖排朝东、靠着灰色柱子，正对东墙电视

const TV = { x: 3, y: 26, w: 4 };  box(TV.x, TV.y, TV.w, 1);
const TV2 = { x: 38, y: 8, h: 3 };  box(TV2.x, TV2.y, 1, TV2.h);   // 挂在东墙、屏幕朝西，与沙发对齐
const MAP = { x: 3, y: 22, w: 4, h: 4 }; box(MAP.x, MAP.y, MAP.w, MAP.h);   // 沙发↔电视之间的大方形地形图
const WALLPIC = { x: 12, y: 9, w: 2, h: 4 };   // 左中桌右侧墙上的挂画（可点，打开 wall1/wall2）
const counter = { x: 14, y: 24, w: 6 };  box(counter.x, counter.y, counter.w, 1);

const PLANTS = [{ x: 10, y: 3 }, { x: 20, y: 22 }, { x: 26, y: 23 }, { x: 11, y: 17 }];
PLANTS.forEach(p => grid[p.y][p.x] = 1);

// 满铺地毯：铺满整个店内地面（外墙以内），入口方砖会再盖回去
const RUG = { x: 1, y: 2, w: GW - 2, h: GH - 3 };

const LAMPS = [
  { x: 6, y: 5 },                                             // 左上长桌
  { x: 4.5, y: 12 }, { x: 9.5, y: 12 },                       // 左墙桌 / 左中桌
  { x: 16, y: 6 }, { x: 16, y: 12 },                          // 包间大桌（上 / 下）
  { x: 24, y: 5 },                                            // 北窗桌
  { x: 23.5, y: 13 }, { x: 28.5, y: 13 }, { x: 33.5, y: 13 }, // 东厅上排三方桌
  { x: 23.5, y: 18 }, { x: 28.5, y: 18 }, { x: 33.5, y: 18 }, // 东厅下排三方桌
  { x: 16, y: 19 },                                           // 厅心长桌
  { x: 17, y: 23 },                                           // 收银台
  { x: 5, y: 21 },                                            // 左下沙发电视区
  { x: 35, y: 9 },                                            // 东角沙发电视区
  { x: 33, y: 25 },                                           // 底部走廊 / 入口
];

const COUNTER_SPOTS = [{ x: 15, y: 23 }, { x: 17, y: 23 }, { x: 19, y: 23 }];
const STAFF_POST = { x: 16, y: 25 };
const SPAWN = { x: 38, y: 25 };

/* ══ A* ═══════════════════════════════════════════════ */
function findPath(sxg, syg, tx, ty) {
  if (sxg === tx && syg === ty) return [];
  const key = (x, y) => y * GW + x;
  const open = [{ x: sxg, y: syg, g: 0, f: 0, p: null }];
  const seen = new Map([[key(sxg, syg), 0]]);
  const D = [[1,0],[-1,0],[0,1],[0,-1]];
  let guard = 0;
  while (open.length && guard++ < 12000) {
    let bi = 0;
    for (let i = 1; i < open.length; i++) if (open[i].f < open[bi].f) bi = i;
    const cur = open.splice(bi, 1)[0];
    if (cur.x === tx && cur.y === ty) {
      const out = []; let n = cur;
      while (n.p) { out.unshift({ x: n.x, y: n.y }); n = n.p; }
      return out;
    }
    for (const [dx, dy] of D) {
      const nx = cur.x + dx, ny = cur.y + dy;
      if (!(nx === tx && ny === ty) && !walkable(nx, ny)) continue;
      if (nx < 0 || ny < 0 || nx >= GW || ny >= GH) continue;
      const g = cur.g + 1, k = key(nx, ny);
      if (seen.has(k) && seen.get(k) <= g) continue;
      seen.set(k, g);
      open.push({ x: nx, y: ny, g, f: g + Math.abs(nx - tx) + Math.abs(ny - ty), p: cur });
    }
  }
  return null;
}

/* ══ 地面 ═════════════════════════════════════════════ */
const PLANKS = ["#a9723f", "#a06a3a", "#b17b47", "#9c6738", "#b5804d", "#a46e3c"];
const hash = (a, b) => (((a * 73856093) ^ (b * 19349663)) >>> 0);

(function buildFloor() {
  /* ── 错缝长条木地板 ── */
  const PL = 48;
  for (let y = 0; y < GH; y++) {
    const Y = y * TW, off = (y % 3) * 16;
    for (let px = -PL; px < NW; px += PL) {
      const X = px + off, s = hash(X + 999, y);
      fx.fillStyle = PLANKS[s % PLANKS.length];
      fx.fillRect(X, Y, PL, TW);
      fx.fillStyle = "rgba(255,235,200,.09)"; fx.fillRect(X, Y, PL, 1);
      fx.fillStyle = "rgba(58,30,10,.50)";    fx.fillRect(X, Y + TW - 1, PL, 1);
      fx.fillStyle = "rgba(58,30,10,.45)";    fx.fillRect(X, Y, 1, TW);
      fx.fillStyle = "rgba(255,235,200,.06)"; fx.fillRect(X + 1, Y, 1, TW - 1);
      fx.fillStyle = "rgba(70,40,16,.12)";
      fx.fillRect(X + 4, Y + 3 + (s >> 3) % 4, PL - 9, 1);
      fx.fillRect(X + 2, Y + 9 + (s >> 7) % 4, PL - 6, 1);
      if ((s >> 11) % 5 === 0) {                       // 节疤
        const kx = X + 8 + (s >> 13) % (PL - 18), ky = Y + 5 + (s >> 17) % 6;
        fx.fillStyle = "rgba(70,40,16,.16)"; fx.fillRect(kx - 1, ky - 1, 5, 4);
        fx.fillStyle = "rgba(70,40,16,.32)"; fx.fillRect(kx, ky, 3, 2);
      }
    }
  }

  /* ── 满铺地毯（暖调灰，编织纹）：先铺满，入口方砖随后盖回去 ── */
  const rx = RUG.x * TW, ry = RUG.y * TW, rw = RUG.w * TW, rh = RUG.h * TW;
  fx.fillStyle = C.rugEdge; fx.fillRect(rx, ry, rw, rh);
  fx.fillStyle = C.rug;     fx.fillRect(rx + 3, ry + 3, rw - 6, rh - 6);
  for (let j = 0; j < rh - 6; j += 2) {                 // 编织横纹
    fx.fillStyle = j % 4 ? "rgba(255,255,255,.030)" : "rgba(0,0,0,.045)";
    fx.fillRect(rx + 3, ry + 3 + j, rw - 6, 1);
  }
  // 满铺就不能用小地毯那种密条纹（会糊成一片），改成拉开距离的小菱形
  fx.fillStyle = C.rugPat;
  const DIA = [1, 3, 5, 3, 1];
  for (let j = 24; j < rh - 24; j += 32)
    for (let i = 24; i < rw - 24; i += 32)
      for (let k = 0; k < 5; k++)
        fx.fillRect(rx + i - (DIA[k] >> 1), ry + j - 2 + k, DIA[k], 1);
  fx.fillStyle = C.rug2;                                // 沿墙压一圈边线
  fx.fillRect(rx + 9, ry + 9, rw - 18, 1); fx.fillRect(rx + 9, ry + rh - 10, rw - 18, 1);
  fx.fillRect(rx + 9, ry + 9, 1, rh - 18); fx.fillRect(rx + rw - 10, ry + 9, 1, rh - 18);

  /* ── 入口走廊：方砖（压在地毯上，进门这段仍是硬地） ── */
  for (let y = 25; y <= 26; y++) for (let x = 21; x < GW - 1; x++) {
    for (let j = 0; j < 2; j++) for (let i = 0; i < 2; i++) {
      const t = ((x * 2 + i) + (y * 2 + j)) % 2;
      const X = x * TW + i * 8, Y = y * TW + j * 8;
      fx.fillStyle = t ? "#8e8476" : "#7c7267";
      fx.fillRect(X, Y, 8, 8);
      fx.fillStyle = "rgba(255,255,255,.06)"; fx.fillRect(X + 1, Y + 1, 6, 1);
      fx.fillStyle = "rgba(0,0,0,.20)"; fx.fillRect(X, Y, 8, 1); fx.fillRect(X, Y, 1, 8);
    }
  }
  fx.fillStyle = "rgba(0,0,0,.22)";                     // 方砖与地毯的接缝
  fx.fillRect(21 * TW, 25 * TW, 1, TW * 2);
  fx.fillRect(21 * TW, 25 * TW, (GW - 22) * TW, 1);

  /* ── 门口地垫 ── */
  fx.fillStyle = "#4f4436"; fx.fillRect(35 * TW, 25 * TW + 2, TW * 3, TW - 4);
  fx.fillStyle = "#6b6049"; fx.fillRect(35 * TW + 2, 25 * TW + 4, TW * 3 - 4, TW - 8);
  for (let i = 0; i < TW * 3 - 6; i += 3) {
    fx.fillStyle = "rgba(0,0,0,.14)"; fx.fillRect(35 * TW + 3 + i, 25 * TW + 5, 1, TW - 10);
  }
  pxText(fx, "OPEN", 35 * TW + 14, 25 * TW + 6, "#bda674");

  /* ── 接触阴影：贴着所有实体的一圈暗边 ── */
  const solid = (i, j) => !(i >= 0 && j >= 0 && i < GW && j < GH) || grid[j][i] === 1;
  const AO = 6;
  for (let y = 0; y < GH; y++) for (let x = 0; x < GW; x++) {
    if (grid[y][x]) continue;
    const X = x * TW, Y = y * TW;
    let g;
    if (solid(x, y - 1)) {
      g = fx.createLinearGradient(0, Y, 0, Y + AO + 2);
      g.addColorStop(0, "rgba(30,16,4,.46)"); g.addColorStop(1, "rgba(30,16,4,0)");
      fx.fillStyle = g; fx.fillRect(X, Y, TW, AO + 2);
    }
    if (solid(x - 1, y)) {
      g = fx.createLinearGradient(X, 0, X + AO, 0);
      g.addColorStop(0, "rgba(30,16,4,.38)"); g.addColorStop(1, "rgba(30,16,4,0)");
      fx.fillStyle = g; fx.fillRect(X, Y, AO, TW);
    }
    if (solid(x + 1, y)) {
      g = fx.createLinearGradient(X + TW, 0, X + TW - AO, 0);
      g.addColorStop(0, "rgba(30,16,4,.38)"); g.addColorStop(1, "rgba(30,16,4,0)");
      fx.fillStyle = g; fx.fillRect(X + TW - AO, Y, AO, TW);
    }
    if (solid(x, y + 1)) {
      g = fx.createLinearGradient(0, Y + TW, 0, Y + TW - 4);
      g.addColorStop(0, "rgba(30,16,4,.24)"); g.addColorStop(1, "rgba(30,16,4,0)");
      fx.fillStyle = g; fx.fillRect(X, Y + TW - 4, TW, 4);
    }
  }
})();

/* ══ 墙 ═══════════════════════════════════════════════ */
function drawWindow(ctx, x, night, time) {
  const y = 5, w = TW * 3, h = 17;
  const skyTop = night > .55 ? "#141c34" : night > .25 ? "#c9743c" : "#7fbcd8";
  const skyBot = night > .55 ? "#26305a" : night > .25 ? "#edb977" : "#c6e6f0";
  ctx.fillStyle = "#3d2716"; ctx.fillRect(x - 3, y - 3, w + 6, h + 8);
  ctx.fillStyle = C.wains;   ctx.fillRect(x - 2, y - 2, w + 4, h + 6);
  const g = ctx.createLinearGradient(0, y, 0, y + h);
  g.addColorStop(0, skyTop); g.addColorStop(1, skyBot);
  ctx.fillStyle = g; ctx.fillRect(x, y, w, h);
  if (night < .25) {                                   // 白天：远处树影 + 云
    ctx.fillStyle = "rgba(90,140,110,.55)";
    ctx.fillRect(x + 3, y + h - 6, 9, 6); ctx.fillRect(x + 6, y + h - 9, 4, 3);
    ctx.fillRect(x + 30, y + h - 5, 11, 5); ctx.fillRect(x + 33, y + h - 8, 5, 3);
    ctx.fillStyle = "rgba(255,255,255,.55)";
    const cx = x + ((time * 5) % (w + 20)) - 10;
    ctx.fillRect(cx, y + 3, 9, 2); ctx.fillRect(cx + 2, y + 2, 5, 1);
  } else if (night > .55) {                            // 夜：星 + 月
    ctx.fillStyle = "rgba(255,255,255,.75)";
    ctx.fillRect(x + 6, y + 3, 1, 1); ctx.fillRect(x + 19, y + 6, 1, 1);
    ctx.fillRect(x + 33, y + 2, 1, 1); ctx.fillRect(x + 41, y + 9, 1, 1);
    ctx.fillStyle = "rgba(255,246,214,.85)"; ctx.fillRect(x + 27, y + 3, 4, 4);
    ctx.fillStyle = skyTop; ctx.fillRect(x + 26, y + 2, 3, 3);
  }
  ctx.fillStyle = "rgba(255,255,255,.20)"; ctx.fillRect(x, y, w, 2);   // 玻璃反光
  ctx.fillStyle = "rgba(255,255,255,.10)"; ctx.fillRect(x + 2, y + 2, 3, h - 4);
  ctx.fillStyle = C.wains;                                            // 窗棂
  ctx.fillRect(x + w / 2 - 1, y, 2, h); ctx.fillRect(x, y + 8, w, 2);
  ctx.fillStyle = C.wainsHi; ctx.fillRect(x, y + 8, w, 1);
  // 窗帘
  ctx.fillStyle = "#9c4a42"; ctx.fillRect(x - 2, y - 2, 6, h + 3); ctx.fillRect(x + w - 4, y - 2, 6, h + 3);
  ctx.fillStyle = "#b85e52"; ctx.fillRect(x - 2, y - 2, 2, h + 3); ctx.fillRect(x + w - 4, y - 2, 2, h + 3);
  ctx.fillStyle = "rgba(0,0,0,.22)"; ctx.fillRect(x + 3, y - 2, 1, h + 3); ctx.fillRect(x + w - 1, y - 2, 1, h + 3);
  // 窗台 + 小盆栽
  ctx.fillStyle = "#8a5c33"; ctx.fillRect(x - 4, y + h + 1, w + 8, 3);
  ctx.fillStyle = "#a87345"; ctx.fillRect(x - 4, y + h + 1, w + 8, 1);
  ctx.fillStyle = C.pot;   ctx.fillRect(x + w - 16, y + h - 3, 6, 4);
  ctx.fillStyle = C.plant; ctx.fillRect(x + w - 15, y + h - 7, 4, 4);
  ctx.fillStyle = C.plant2;ctx.fillRect(x + w - 14, y + h - 9, 2, 3);
}

    ctx.fillRect(x + 6, y + 7, 13, 2); ctx.fillRect(x + 8, y + 10, 3, 4); ctx.fillRect(x + 14, y + 10, 3, 4);
    ctx.fillStyle = "#9c8a63"; ctx.fillRect(x + 3, y + 15, 20, 1);

    ctx.fillStyle = "#e8dcc0";
    ctx.fillRect(x + 6, y + 6, 2, 2); ctx.fillRect(x + 10, y + 10, 2, 2);

function drawWallClock(ctx, x) {
  const cy = 14, r = 8;
  ctx.fillStyle = "#3d2716"; pxCircle(ctx, x, cy, r, "#3d2716");
  pxCircle(ctx, x, cy, r - 1, "#8a5c33");
  pxCircle(ctx, x, cy, r - 2, "#f0e6d2");
  ctx.fillStyle = "#8a8474";
  ctx.fillRect(x - 1, cy - r + 3, 2, 1); ctx.fillRect(x - 1, cy + r - 4, 2, 1);
  ctx.fillRect(x - r + 3, cy - 1, 1, 2); ctx.fillRect(x + r - 4, cy - 1, 1, 2);
  const p = clock / DAY, mins = 10 * 60 + p * 12 * 60;
  const ha = ((mins / 60) % 12) / 12 * Math.PI * 2 - Math.PI / 2;
  const ma = (mins % 60) / 60 * Math.PI * 2 - Math.PI / 2;
  ctx.fillStyle = "#3a3025";
  for (let i = 0; i < 4; i++) ctx.fillRect(Math.round(x + Math.cos(ha) * i), Math.round(cy + Math.sin(ha) * i), 1, 1);
  for (let i = 0; i < 6; i++) ctx.fillRect(Math.round(x + Math.cos(ma) * i), Math.round(cy + Math.sin(ma) * i), 1, 1);
  ctx.fillStyle = "#c94f3d"; ctx.fillRect(x, cy, 1, 1);
}

function drawOuterWalls(ctx, night, time) {
  // 墙体
  ctx.fillStyle = C.wallLo; ctx.fillRect(0, 0, NW, 32);
  ctx.fillStyle = C.wall;   ctx.fillRect(0, 3, NW, 24);
  ctx.fillStyle = C.wallHi; ctx.fillRect(0, 3, NW, 2);
  for (let i = 0; i < NW; i += 5) {                    // 灰泥竖纹
    ctx.fillStyle = (i / 5) % 2 ? "rgba(255,255,255,.030)" : "rgba(0,0,0,.022)";
    ctx.fillRect(i, 4, 2, 22);
  }
  ctx.fillStyle = "#5c3a20"; ctx.fillRect(0, 0, NW, 3);          // 顶檐
  ctx.fillStyle = "#7a4f2c"; ctx.fillRect(0, 0, NW, 1);
  ctx.fillStyle = "#6b4226"; ctx.fillRect(0, 25, NW, 2);         // 挂镜线
  ctx.fillStyle = "#8a5c33"; ctx.fillRect(0, 25, NW, 1);
  ctx.fillStyle = C.wains;  ctx.fillRect(0, 27, NW, 5);          // 墙裙
  ctx.fillStyle = C.wainsHi;ctx.fillRect(0, 27, NW, 1);
  for (let i = 6; i < NW; i += 14) { ctx.fillStyle = "rgba(0,0,0,.18)"; ctx.fillRect(i, 28, 1, 4); }
  ctx.fillStyle = "rgba(0,0,0,.22)"; ctx.fillRect(0, 30, NW, 2); // 墙脚阴影

  // 墙面陈设（col 29 往右是非店内区块，不放东西）
  drawWindow(ctx, 2 * TW, night, time);
  drawPoster(ctx, 6 * TW + 4, 0);
  const sign = "BOARD GAMES";
  const sw = textW(sign) + 12, sxp = Math.round(11.5 * TW - sw / 2);
  ctx.fillStyle = "#2e1c10"; ctx.fillRect(sxp - 1, 5, sw + 2, 16);
  ctx.fillStyle = C.shelfHi; ctx.fillRect(sxp, 6, sw, 14);
  ctx.fillStyle = C.shelfW;  ctx.fillRect(sxp + 1, 7, sw - 2, 12);
  ctx.fillStyle = "rgba(255,255,255,.10)"; ctx.fillRect(sxp + 1, 7, sw - 2, 1);
  pxText(ctx, sign, sxp + 6, 10, "#f6e4bc");
  ctx.fillStyle = "#e8b24a"; ctx.fillRect(sxp + 3, 9, 1, 8); ctx.fillRect(sxp + sw - 4, 9, 1, 8);
  drawWindow(ctx, 15 * TW, night, time);
  drawChalkboard(ctx, 19 * TW + 2);
  drawWindow(ctx, 24 * TW, night, time);
  drawWallClock(ctx, 28 * TW + 6);

  // 侧墙 / 下墙
  ctx.fillStyle = C.wains;
  ctx.fillRect(0, 32, TW, NH - 32);
  ctx.fillRect(NW - TW, 32, TW, NH - 32);
  ctx.fillRect(0, NH - TW, NW, TW);
  ctx.fillStyle = C.wainsHi;
  ctx.fillRect(0, 32, TW, 2); ctx.fillRect(NW - TW, 32, TW, 2); ctx.fillRect(0, NH - TW, NW, 2);
  ctx.fillStyle = "rgba(0,0,0,.20)";
  for (let j = 40; j < NH; j += 14) { ctx.fillRect(2, j, 12, 1); ctx.fillRect(NW - 14, j, 12, 1); }
  for (let i = 6; i < NW; i += 14) ctx.fillRect(i, NH - TW + 3, 1, TW - 4);

  // 大门
  ctx.fillStyle = "#2e1c10"; ctx.fillRect(NW - TW, 25 * TW, TW, TW * 2);
  ctx.fillStyle = "#503722"; ctx.fillRect(NW - TW + 2, 25 * TW + 2, TW - 4, TW * 2 - 4);
  ctx.fillStyle = "#1c1409"; ctx.fillRect(NW - TW + 4, 25 * TW + 5, TW - 7, TW * 2 - 10);
  const gl = ctx.createLinearGradient(NW - TW + 4, 0, NW, 0);
  gl.addColorStop(0, night > .5 ? "rgba(40,50,90,.9)" : "rgba(150,200,225,.85)");
  gl.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = gl; ctx.fillRect(NW - TW + 4, 25 * TW + 5, TW - 7, TW * 2 - 10);
  ctx.fillStyle = "#c9a24a"; ctx.fillRect(NW - TW + 4, 26 * TW - 1, 2, 3);
}

/* 一格架子里塞的桌游：封面朝外的盒 / 立着的盒脊 / 平摊的盒堆 / 空位。
   桌游盒比书宽、方、色块大，封面有对比色画面 + 标题条，整体不像图书馆。 */
function spineRun(ctx, x, y, len, vertical, seed0) {
  let p = 0, seed = seed0 | 1;
  const nx = () => (seed = (seed * 1103515245 + 12345) & 0x7fffffff);
  const pick = () => SPINE[nx() % SPINE.length];
  const H = 10;
  // 盒盖画面：底色 + 对比色画框 + 高光点，像桌游封面
  const cover = (bx, by, bw, bh) => {
    const base = pick(); ctx.fillStyle = base; ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle = "rgba(255,255,255,.28)"; ctx.fillRect(bx, by, bw, 1);
    ctx.fillStyle = "rgba(0,0,0,.30)"; ctx.fillRect(bx + bw - 1, by, 1, bh);
    let art = pick(); if (art === base) art = pick();
    ctx.fillStyle = art; ctx.fillRect(bx + 1, by + 2, bw - 2, bh - 4);
    ctx.fillStyle = "rgba(255,255,255,.55)"; ctx.fillRect(bx + 2, by + 3, 2, 2);
    ctx.fillStyle = "rgba(0,0,0,.35)"; ctx.fillRect(bx + 1, by + bh - 2, bw - 2, 1);  // 标题条
  };
  while (p < len - 3) {
    const r = nx() % 100;
    if (!vertical) {
      if (r < 6) { p += 2 + (nx() % 2); continue; }                        // 空位
      if (r < 34) {                                                        // 封面朝外的盒
        const bw = 8 + (nx() % 3); if (p + bw > len - 1) break;
        ctx.fillStyle = "rgba(0,0,0,.42)"; ctx.fillRect(x + p + 1, y + 1, bw, H);
        cover(x + p, y - 1, bw, H);
        p += bw + 1; continue;
      }
      if (r < 56) {                                                        // 平摊叠放的盒堆
        const bw = 7 + (nx() % 3), stack = 2 + (nx() % 2); if (p + bw > len - 1) break;
        for (let k = 0; k < stack; k++) {
          const off = k % 2, yy = y + H - 1 - k * 3;
          ctx.fillStyle = pick(); ctx.fillRect(x + p + off, yy - 3, bw - off * 2, 3);
          ctx.fillStyle = "rgba(255,255,255,.28)"; ctx.fillRect(x + p + off, yy - 3, bw - off * 2, 1);
          ctx.fillStyle = "rgba(0,0,0,.32)"; ctx.fillRect(x + p + off, yy - 1, bw - off * 2, 1);
        }
        p += bw + 1; continue;
      }
      const grp = 2 + (nx() % 3);                                          // 立着的盒脊（成组）
      for (let g = 0; g < grp && p < len - 3; g++) {
        const s = 3 + (nx() % 3), h = 8 + (nx() % 3); if (p + s > len - 1) break;
        const yy = y + (H - h);
        ctx.fillStyle = pick(); ctx.fillRect(x + p, yy, s, h);
        ctx.fillStyle = "rgba(255,255,255,.24)"; ctx.fillRect(x + p, yy, 1, h);
        ctx.fillStyle = "rgba(0,0,0,.30)"; ctx.fillRect(x + p + s - 1, yy, 1, h);
        ctx.fillStyle = "rgba(255,255,255,.5)"; ctx.fillRect(x + p, yy + (h >> 1) - 1, s, 1);   // 标题带
        ctx.fillStyle = "rgba(0,0,0,.22)"; ctx.fillRect(x + p, yy + (h >> 1) + 1, s, 1);
        p += s + 1;
      }
    } else {
      if (r < 6) { p += 2 + (nx() % 2); continue; }
      if (r < 32) {                                                        // 竖架上封面朝外的盒
        const bh = 8 + (nx() % 2); if (p + bh > len - 1) break;
        const base = pick(); ctx.fillStyle = base; ctx.fillRect(x - 1, y + p, 9, bh);
        ctx.fillStyle = "rgba(255,255,255,.26)"; ctx.fillRect(x - 1, y + p, 9, 1);
        let art = pick(); if (art === base) art = pick();
        ctx.fillStyle = art; ctx.fillRect(x + 1, y + p + 2, 5, bh - 4);
        ctx.fillStyle = "rgba(255,255,255,.5)"; ctx.fillRect(x + 1, y + p + 2, 2, 2);
        ctx.fillStyle = "rgba(0,0,0,.3)"; ctx.fillRect(x - 1, y + p + bh - 1, 9, 1);
        p += bh + 1; continue;
      }
      const s = 3 + (nx() % 2), wgt = 7 + (nx() % 2); if (p + s > len - 1) break;   // 平摊盒脊
      ctx.fillStyle = pick(); ctx.fillRect(x, y + p, wgt, s);
      ctx.fillStyle = "rgba(255,255,255,.22)"; ctx.fillRect(x, y + p, wgt, 1);
      ctx.fillStyle = "rgba(0,0,0,.28)"; ctx.fillRect(x, y + p + s - 1, wgt, 1);
      ctx.fillStyle = "rgba(255,255,255,.4)"; ctx.fillRect(x + 2, y + p, 1, s);      // 竖标题带
      p += s + 1;
    }
  }
}
function drawIWallV(ctx, w) {
  const x = w.x * TW, y = w.y * TW, h = w.h * TW;
  ctx.fillStyle = C.shelfDk; ctx.fillRect(x, y - 8, TW, h + 8);
  ctx.fillStyle = C.shelfW;  ctx.fillRect(x + 1, y - 7, TW - 2, h + 6);
  ctx.fillStyle = C.shelfHi; ctx.fillRect(x + 1, y - 7, TW - 2, 2);
  spineRun(ctx, x + 4, y - 4, h + 2, true, w.x * 977 + w.y * 31);
  ctx.fillStyle = "rgba(0,0,0,.3)"; ctx.fillRect(x + TW - 2, y - 7, 2, h + 6);
}
function drawIWallH(ctx, w) {
  const x = w.x * TW, y = w.y * TW, wd = w.w * TW;
  ctx.fillStyle = C.shelfDk; ctx.fillRect(x, y - 10, wd, TW + 10);

  ctx.fillStyle = C.shelfHi; ctx.fillRect(x + 1, y - 9, wd - 2, 2);
  spineRun(ctx, x + 2, y - 7, wd - 4, false, w.x * 613 + w.y * 17);

/* 桌面常驻小物：即使空桌也有生活痕迹 */
function drawTableClutter(ctx, t, cx, cy, w, h) {
  const s = hash(t.x + 7, t.y + 3);
  const kinds = s % 4;
  if (kinds === 0) {                                   // 骰盘
    pxCircle(ctx, cx - w / 3, cy, 5, "#6b4226");
    pxCircle(ctx, cx - w / 3, cy, 4, "#8a5834");
    ctx.fillStyle = "#f6f1e4";
    ctx.fillRect(cx - w / 3 - 2, cy - 1, 2, 2); ctx.fillRect(cx - w / 3 + 1, cy + 1, 2, 2);
  } else if (kinds === 1) {                            // 马克杯 + 杯垫
    pxCircle(ctx, cx - w / 3, cy + 1, 4, "#5c4a30");
    ctx.fillStyle = "#f0e6d2"; ctx.fillRect(cx - w / 3 - 3, cy - 3, 6, 6);
    ctx.fillStyle = "#6b4226"; ctx.fillRect(cx - w / 3 - 2, cy - 2, 4, 2);
    ctx.fillStyle = "#f0e6d2"; ctx.fillRect(cx - w / 3 + 3, cy - 2, 1, 3);
  } else if (kinds === 2) {                            // 记分本 + 铅笔
    ctx.fillStyle = "#e8dcc0"; ctx.fillRect(cx - w / 3 - 4, cy - 4, 9, 8);
    ctx.fillStyle = "#c9b78f"; ctx.fillRect(cx - w / 3 - 4, cy - 4, 9, 1);
    ctx.fillStyle = "rgba(90,70,45,.55)";
    for (let i = 0; i < 3; i++) ctx.fillRect(cx - w / 3 - 3, cy - 2 + i * 2, 7, 1);
    ctx.fillStyle = "#e0b040"; ctx.fillRect(cx - w / 3 + 5, cy - 3, 1, 7);
  } else {                                             // 零食碗
    pxCircle(ctx, cx - w / 3, cy, 5, "#7a4a2b");
    pxCircle(ctx, cx - w / 3, cy - 1, 4, "#a06e39");
    ctx.fillStyle = "#e8c46a";
    ctx.fillRect(cx - w / 3 - 2, cy - 2, 2, 2); ctx.fillRect(cx - w / 3 + 1, cy - 3, 2, 2);
    ctx.fillRect(cx - w / 3 - 1, cy, 2, 2);

  if ((s >> 5) % 3 === 0) {                            // 一副牌
    ctx.fillStyle = "#3a5f8a"; ctx.fillRect(cx + w / 3 - 2, cy - 4, 6, 8);
    ctx.fillStyle = "#5f88b5"; ctx.fillRect(cx + w / 3 - 2, cy - 4, 6, 1);
    ctx.fillStyle = "rgba(255,255,255,.35)"; ctx.fillRect(cx + w / 3, cy - 2, 2, 3);
  }
}

function drawTable(ctx, t, time) {
  const x = t.x * TW, y = t.y * TW, w = t.w * TW, h = t.h * TW;
  ctx.fillStyle = "rgba(0,0,0,.22)"; ctx.fillRect(x + 2, y + h - 3, w - 4, 5);
  ctx.fillStyle = C.tableEdge; ctx.fillRect(x, y - 6, w, h + 4);
  ctx.fillStyle = C.tableLo;   ctx.fillRect(x + 1, y - 5, w - 2, h + 2);
  ctx.fillStyle = C.tableTop;  ctx.fillRect(x + 2, y - 4, w - 4, h);
  ctx.fillStyle = C.tableHi;   ctx.fillRect(x + 2, y - 4, w - 4, 2);
  ctx.fillStyle = "rgba(0,0,0,.07)";
  for (let i = 6; i < w - 6; i += 7) ctx.fillRect(x + i, y - 2, 1, h - 3);
  ctx.fillStyle = "rgba(0,0,0,.14)"; ctx.fillRect(x + 2, y + h - 3, w - 4, 1);
  drawTableClutter(ctx, t, x + w / 2, y + h / 2 - 2, w, h);

  const seated = t.chairs.filter(c => c.by).length;
  if (seated >= 1 && t.game) {
    const bx = x + Math.floor(w / 2) - 11, by = y + Math.floor(h / 2) - 8;
    ctx.fillStyle = "#e8dcc0"; ctx.fillRect(bx, by, 22, 14);
    ctx.fillStyle = "#c9b78f"; ctx.fillRect(bx + 1, by + 1, 20, 12);
    for (let i = 0; i < 5; i++) for (let j = 0; j < 3; j++)
      if ((i + j) % 2 === 0) { ctx.fillStyle = "#9d8a63"; ctx.fillRect(bx + 2 + i * 4, by + 2 + j * 4, 4, 4); }
    ctx.fillStyle = "#8c3f3a"; ctx.fillRect(bx - 6, by + 4, 5, 7);
    ctx.fillStyle = "#b25a4e"; ctx.fillRect(bx - 6, by + 4, 5, 1);
    t.chairs.forEach((c, i) => {
      if (!c.by) return;
      const px = bx + 3 + ((i * 5) % 16), py = by + 3 + ((i * 7) % 8);
      ctx.fillStyle = c.by.shirt;
      ctx.fillRect(px, py + 1, 3, 2); ctx.fillRect(px + 1, py, 1, 1);
    });
    const roll = t.rollT > 0;
    const dy = roll ? Math.floor(Math.sin(time * 30 + t.id) * 2) : 0;
    ctx.fillStyle = "#f6f1e4"; ctx.fillRect(bx + 25, by + 8 + dy, 4, 4);
    ctx.fillStyle = "#3a3025";
    const pip = roll ? Math.floor(time * 12 + t.id) % 3 : (t.id % 3);
    ctx.fillRect(bx + 26, by + 9 + dy, 1, 1);
    if (pip > 0) ctx.fillRect(bx + 27, by + 10 + dy, 1, 1);
    if (pip > 1) ctx.fillRect(bx + 26, by + 11 + dy, 1, 1);
  }
  if (t.game) {                                     // 空桌不挂牌，免得满屏 FREE
    const label = t.game.toUpperCase(), lw = textW(label);
    ctx.fillStyle = "rgba(0,0,0,.34)";
    ctx.fillRect(x + Math.floor(w / 2 - lw / 2) - 2, y - 13, lw + 4, 8);
    pxText(ctx, label, x + Math.floor(w / 2 - lw / 2), y - 12, "#ffd48a");
  }
}
const PILLOW = ["#c96a9b", "#e0913a", "#c94f3d", "#e6c34a"];
function drawSofa(ctx, s) {
  const x = s.x * TW, y = s.y * TW, w = s.w * TW, h = s.h * TW;
  ctx.fillStyle = "rgba(0,0,0,.22)"; ctx.fillRect(x + 2, y + h - 2, w - 4, 4);
  if (!s.vert) {                                     // 横排 · 靠背在上
    ctx.fillStyle = C.sofaDk; ctx.fillRect(x, y - 11, w, TW + 9);

    ctx.fillStyle = "rgba(0,0,0,.18)"; ctx.fillRect(x + 2, y - 4, w - 4, 2);
    for (let i = 0; i < s.len; i++) {                                     // 坐垫
      const cx = x + i * TW;

      ctx.fillStyle = C.sofaHi; ctx.fillRect(cx + 3, y - 1, TW - 6, 2);

    ctx.fillRect(x, y - 6, 4, 2); ctx.fillRect(x + w - 4, y - 6, 4, 2);

  } else {                                           // 竖排 · 朝东则靠背在左，朝西则靠背在右

    const backX = east ? x : x + 10;                 // 靠背在坐者背后
    ctx.fillStyle = C.sofaDk; ctx.fillRect(x, y - 6, TW, h + 4);

    ctx.fillStyle = C.sofaHi; ctx.fillRect(cushX, y - 5, 8, 3);
    for (let i = 0; i < s.len; i++) {                                     // 坐垫
      const cy = y + i * TW;

    }

  }
}
// 沙发↔电视之间那张大方桌，摆着一整幅鲜艳的桌游地形图
function drawTerrainMap(ctx, time) {
  const x = MAP.x * TW, y = MAP.y * TW, w = MAP.w * TW, h = MAP.h * TW;
  // 桌身 + 桌腿投影
  ctx.fillStyle = "rgba(0,0,0,.24)"; ctx.fillRect(x + 4, y + h - 3, w - 8, 5);
  ctx.fillStyle = C.tableEdge; ctx.fillRect(x + 1, y + 2, w - 2, h - 4);
  ctx.fillStyle = C.tableLo;   ctx.fillRect(x + 1, y + h - 6, w - 2, 4);
  // 地图底板（米色羊皮纸）
  const bx = x + 4, by = y + 5, bw = w - 8, bh = h - 12;
  ctx.fillStyle = "#efe2c0"; ctx.fillRect(bx, by, bw, bh);
  // 地形色块：河、湖、林、田、沙、山、路——用固定伪随机铺格，鲜艳
  const PAL = ["#3f9d4e", "#7ec850", "#e8c74a", "#e59b3c", "#3f8fce", "#5fc7d8", "#b0552f", "#8a8f98"];
  const cell = 4;
  const cols = Math.floor(bw / cell), rows = Math.floor(bh / cell);
  const hash = (i, j) => { const s = Math.sin(i * 12.9898 + j * 78.233) * 43758.5453; return s - Math.floor(s); };
  for (let j = 0; j < rows; j++) for (let i = 0; i < cols; i++) {
    // 中间偏蓝（湖），四周偏绿，穿插田/沙，右下一坨山
    const dx = i - cols / 2, dy = j - rows / 2, d = Math.hypot(dx, dy);
    let idx;
    const r = hash(i, j);
    if (d < 2.2) idx = r < .5 ? 4 : 5;                 // 中心湖泊
    else if (i > cols - 4 && j > rows - 4) idx = r < .5 ? 7 : 6;  // 右下山脉
    else if (r < .30) idx = 0;                          // 深林
    else if (r < .55) idx = 1;                          // 浅草
    else if (r < .72) idx = 2;                          // 麦田
    else if (r < .84) idx = 3;                          // 沙地
    else if (r < .92) idx = 4;                          // 支流
    else idx = 6;                                       // 土路
    ctx.fillStyle = PAL[idx];
    ctx.fillRect(bx + i * cell, by + j * cell, cell, cell);
  }
  // 一条蜿蜒的河（亮蓝）横穿
  ctx.fillStyle = "#4fa8e0";
  for (let i = 0; i < cols; i++) {
    const ry = by + Math.round(bh * .5 + Math.sin(i * .6) * bh * .18);
    ctx.fillRect(bx + i * cell, ry, cell, cell);
  }
  // 几个据点（红/黄小屋）与棋子高光
  const spots = [[.18, .28, "#d23b32"], [.72, .22, "#e6c34a"], [.30, .74, "#c96a9b"], [.82, .66, "#7a5aa8"], [.5, .5, "#f2efe6"]];
  for (const [fx, fy, col] of spots) {
    ctx.fillStyle = "rgba(0,0,0,.35)"; ctx.fillRect(bx + bw * fx, by + bh * fy + 1, 3, 2);
    ctx.fillStyle = col; ctx.fillRect(bx + bw * fx, by + bh * fy - 1, 3, 3);
    ctx.fillStyle = "rgba(255,255,255,.6)"; ctx.fillRect(bx + bw * fx, by + bh * fy - 1, 1, 1);
  }
  // 羊皮纸描边 + 表面反光，暗示可点
  ctx.fillStyle = "rgba(60,40,20,.55)";
  ctx.fillRect(bx, by, bw, 1); ctx.fillRect(bx, by + bh - 1, bw, 1);
  ctx.fillRect(bx, by, 1, bh); ctx.fillRect(bx + bw - 1, by, 1, bh);
  const sh = .12 + Math.sin(time * 1.6) * .05;
  ctx.fillStyle = `rgba(255,255,255,${sh})`;
  ctx.fillRect(bx + 1, by + 1, bw - 2, 2);
}
// 左中桌右侧那面墙保持原样，只加一层缓慢扫过的反光，暗示此处可点
function drawWallHint(ctx, time) {
  const x = WALLPIC.x * TW, y = WALLPIC.y * TW, w = WALLPIC.w * TW, h = WALLPIC.h * TW;
  const t = (time * .3) % 1.5;                       // 高光带缓慢下扫
  const cy = y - 6 + t * (h + 12);
  for (let i = 0; i < 8; i++) {
    const yy = Math.round(cy - 4 + i);
    if (yy < y - 2 || yy > y + h + 2) continue;
    const a = (1 - Math.abs(i - 3.5) / 4) * .14;
    ctx.fillStyle = `rgba(255,247,222,${a.toFixed(3)})`;
    ctx.fillRect(x, yy, w, 1);
  }
  const s = .12 + (Math.sin(time * 3) * .5 + .5) * .35;   // 一点微闪
  ctx.fillStyle = `rgba(255,255,255,${s.toFixed(2)})`;
  ctx.fillRect(x + w - 3, y + 4, 1, 1);
}
function drawTV(ctx, time) {
  const x = TV.x * TW, y = TV.y * TW, w = TV.w * TW;
  // 电视柜
  ctx.fillStyle = "rgba(0,0,0,.24)"; ctx.fillRect(x + 2, y + TW - 3, w - 4, 4);
  ctx.fillStyle = "#3a2718"; ctx.fillRect(x, y + 2, w, TW - 3);
  ctx.fillStyle = "#5c3f26"; ctx.fillRect(x + 1, y + 3, w - 2, TW - 5);

  ctx.fillStyle = "rgba(0,0,0,.28)";

  ctx.fillStyle = "#c9b78f";                                    // 柜门拉手
  ctx.fillRect(x + w / 3 - 5, y + 10, 3, 1); ctx.fillRect(x + w / 3 + 3, y + 10, 3, 1);

  ctx.fillStyle = "#2a272e"; ctx.fillRect(x + w - 16, y - 2, 11, 5);

  // 屏幕背对店内：只见机背，光从屏幕后缘溢出

  gg.addColorStop(0, `rgba(130,190,225,${.30 * flick})`);
  gg.addColorStop(.5, `rgba(80,140,190,${.15 * flick})`);
  gg.addColorStop(1, "rgba(80,140,190,0)");
  ctx.fillStyle = gg; ctx.fillRect(sxp - 20, syp - 18, sw + 40, sh + 34);
  // 机背外框 + 背板
  ctx.fillStyle = "#15141a"; ctx.fillRect(sxp - 2, syp - 2, sw + 4, sh + 4);
  ctx.fillStyle = "#26242c"; ctx.fillRect(sxp - 1, syp - 1, sw + 2, sh + 2);
  ctx.fillStyle = "#302d38"; ctx.fillRect(sxp, syp, sw, sh);
  ctx.fillStyle = "rgba(255,255,255,.07)"; ctx.fillRect(sxp, syp, sw, 1);
  // 散热格栅
  ctx.fillStyle = "rgba(0,0,0,.30)";
  for (let i = 3; i < sh - 3; i += 3) ctx.fillRect(sxp + 3, syp + i, sw - 6, 1);
  // 中央安装凸台
  ctx.fillStyle = "#3a3742"; ctx.fillRect(sxp + sw / 2 - 6, syp + sh / 2 - 5, 12, 10);
  ctx.fillStyle = "#211f27"; ctx.fillRect(sxp + sw / 2 - 4, syp + sh / 2 - 3, 8, 6);
  ctx.fillStyle = "rgba(255,255,255,.06)"; ctx.fillRect(sxp + sw / 2 - 6, syp + sh / 2 - 5, 12, 1);
  // 四周边缘漏光（屏幕光溢出）
  ctx.fillStyle = `rgba(155,205,238,${.55 * flick})`;
  ctx.fillRect(sxp - 2, syp - 2, sw + 4, 1);
  ctx.fillRect(sxp - 2, syp + sh + 1, sw + 4, 1);
  ctx.fillRect(sxp - 2, syp - 2, 1, sh + 4);
  ctx.fillRect(sxp + sw + 1, syp - 2, 1, sh + 4);
  // 电源线垂到柜面
  ctx.fillStyle = "#1a1a1f"; ctx.fillRect(sxp + sw / 2, syp + sh + 2, 1, 4);
  // 底座
  ctx.fillStyle = "#1c1a20"; ctx.fillRect(x + w / 2 - 3, y - 1, 6, 3);

}
// 挂在东墙、屏幕朝西的平板电视，正对角落竖排沙发
function drawTVWall(ctx, time) {

  gg.addColorStop(0, `rgba(130,190,225,${.30 * flick})`);
  gg.addColorStop(.5, `rgba(80,140,190,${.14 * flick})`);
  gg.addColorStop(1, "rgba(80,140,190,0)");
  ctx.fillStyle = gg; ctx.fillRect(sx0 - 30, sy0 - 14, sw + 46, sh + 28);
  // 贴墙机身 + 支架
  ctx.fillStyle = "#1c1a20"; ctx.fillRect(x + 2, y + 2, TW - 3, h - 4);

function drawPlant(ctx, p, time) {
  const x = p.x * TW, y = p.y * TW;
  const sway = Math.round(Math.sin(time * 1.1 + p.x) * 1);
  const kind = (p.x + p.y) % 4;
  ctx.fillStyle = "rgba(0,0,0,.22)"; ctx.fillRect(x + 3, y + 12, 10, 3);
  // 花盆
  const potCol = kind === 1 ? "#8a8474" : kind === 3 ? "#5f7386" : C.pot;
  ctx.fillStyle = "#6b3220"; ctx.fillRect(x + 3, y + 5, 10, 9);
  ctx.fillStyle = potCol;    ctx.fillRect(x + 4, y + 6, 8, 7);
  ctx.fillStyle = "rgba(255,255,255,.20)"; ctx.fillRect(x + 4, y + 6, 8, 1);
  ctx.fillStyle = "rgba(0,0,0,.22)"; ctx.fillRect(x + 10, y + 7, 2, 6);
  ctx.fillStyle = "#3a2a18"; ctx.fillRect(x + 5, y + 5, 6, 1);      // 土

  if (kind === 0) {                                   // 高身琴叶榕
    ctx.fillStyle = "#5a3a20"; ctx.fillRect(x + 7, y - 7, 2, 13);
    ctx.fillStyle = C.plant;
    ctx.fillRect(x + 2 + sway, y - 5, 6, 5); ctx.fillRect(x + 8 - sway, y - 9, 6, 5);
    ctx.fillRect(x + 3 + sway, y - 12, 6, 5);
    ctx.fillStyle = C.plant2;
    ctx.fillRect(x + 3 + sway, y - 5, 3, 2); ctx.fillRect(x + 9 - sway, y - 9, 3, 2);
    ctx.fillRect(x + 4 + sway, y - 12, 3, 2);
  } else if (kind === 1) {                            // 蕨类（散开）
    ctx.fillStyle = C.plant;
    for (let i = 0; i < 5; i++) {
      const a = -Math.PI / 2 + (i - 2) * .55, L = 9 + (i % 2) * 2;
      for (let k = 2; k < L; k++)
        ctx.fillRect(Math.round(x + 8 + Math.cos(a) * k + sway * (k / L)),
                     Math.round(y + 5 + Math.sin(a) * k), 2, 2);
    }
    ctx.fillStyle = C.plant2;
    ctx.fillRect(x + 6 + sway, y - 6, 2, 2); ctx.fillRect(x + 10 + sway, y - 4, 2, 2);
  } else if (kind === 2) {                            // 开花的小灌木
    ctx.fillStyle = C.plant;
    ctx.fillRect(x + 4 + sway, y - 3, 9, 8); ctx.fillRect(x + 3 + sway, y - 1, 11, 5);
    ctx.fillRect(x + 6 + sway, y - 6, 5, 4);
    ctx.fillStyle = C.plant2; ctx.fillRect(x + 5 + sway, y - 2, 4, 3);
    ctx.fillStyle = "#e0819b";
    ctx.fillRect(x + 4 + sway, y - 4, 2, 2); ctx.fillRect(x + 10 + sway, y - 2, 2, 2);
    ctx.fillRect(x + 7 + sway, y - 7, 2, 2);
    ctx.fillStyle = "#f0a8bc"; ctx.fillRect(x + 10 + sway, y - 2, 1, 1);
  } else {                                            // 多肉
    ctx.fillStyle = "#5f9c6a";
    ctx.fillRect(x + 5, y, 6, 5); ctx.fillRect(x + 4, y + 2, 8, 3);
    ctx.fillStyle = "#7cbd86";
    ctx.fillRect(x + 6, y - 2, 4, 4); ctx.fillRect(x + 5, y + 1, 2, 2); ctx.fillRect(x + 9, y + 1, 2, 2);
    ctx.fillStyle = "#a8dcae"; ctx.fillRect(x + 7, y - 1, 2, 2);
  }
}

/* 红鸭舌帽：帽檐跟着朝向转 */
function drawCap(ctx, n, cx, hy, hw, mono) {
  const F = c => { ctx.fillStyle = mono || c; };
  F(n.hatColor);                                   // 帽冠：矮而圆，只盖住头顶
  ctx.fillRect(cx - hw, hy - 4, hw * 2 + 1, 5);
  ctx.fillRect(cx - hw + 1, hy - 5, hw * 2 - 1, 1);
  if (!mono) {
    ctx.fillStyle = "rgba(255,255,255,.22)"; ctx.fillRect(cx - hw + 1, hy - 4, 2, 4);
    ctx.fillStyle = "rgba(0,0,0,.24)"; ctx.fillRect(cx + hw - 1, hy - 4, 2, 5);
  }
  F("#8f2019");                                    // 帽檐，跟着朝向伸出
  if (n.dir === "e") ctx.fillRect(cx + hw + 1, hy - 2, 3, 2);
  else if (n.dir === "w") ctx.fillRect(cx - hw - 4, hy - 2, 3, 2);
  else if (n.dir === "s") {
    ctx.fillRect(cx - hw - 1, hy, hw * 2 + 3, 2);
    if (!mono) { ctx.fillStyle = "#a82b22"; ctx.fillRect(cx - hw - 1, hy, hw * 2 + 3, 1); }
  }
  F("#8f2019"); ctx.fillRect(cx, hy - 6, 1, 1);    // 顶扣
}


/* 笔记本电脑：坐着时摊开，走路时夹在腋下 */
function drawLaptop(ctx, n, cx, bodyBase, torsoH, hw, time, mono) {
  if (n.sitting) return;                          // 坐下时电脑摆在桌上，另行绘制
  const bx = n.dir === "w" ? cx - hw - 5 : cx + hw - 1;   // 站着时夹在腋下
  ctx.fillStyle = mono || "#2a2a30"; ctx.fillRect(bx, bodyBase - 6, 5, 5);
  if (mono) return;
  ctx.fillStyle = "#4a4a54"; ctx.fillRect(bx, bodyBase - 6, 5, 1);
  ctx.fillStyle = "#6fbfa8"; ctx.fillRect(bx + 1, bodyBase - 4, 3, 1);
}

/* 坐着时：电脑摆在身前的桌面上 */
function drawSeatedLaptop(ctx, n, time) {
  const ch = n.chair;
  if (!ch) return;
  const d = { e: [1, 0], w: [-1, 0], s: [0, 1], n: [0, -1] }[ch.dir] || [0, 1];
  const cx = Math.round((ch.x + d[0]) * TW + TW / 2);
  const cy = Math.round((ch.y + d[1]) * TW + TW / 2) - 4;   // 抬到桌面高度

  ctx.fillStyle = "rgba(0,0,0,.28)";                        // 桌面上的影子
  ctx.fillRect(cx - 8, cy + 4, 16, 3);
  ctx.fillStyle = "#15151a";                                // 键盘底座
  ctx.fillRect(cx - 8, cy, 16, 6);
  ctx.fillStyle = "#2e2e36"; ctx.fillRect(cx - 7, cy + 1, 14, 4);
  ctx.fillStyle = "#43434e"; ctx.fillRect(cx - 6, cy + 2, 12, 2);
  ctx.fillStyle = "#26262e"; ctx.fillRect(cx - 2, cy + 4, 4, 1);   // 触控板
  ctx.fillStyle = "#15151a";                                // 掀起的屏幕
  ctx.fillRect(cx - 8, cy - 11, 16, 12);
  ctx.fillStyle = "#22222a"; ctx.fillRect(cx - 7, cy - 10, 14, 10);
  const glow = .62 + Math.abs(Math.sin(time * 6.5 + n.seed)) * .28;
  ctx.fillStyle = `rgba(104,180,158,${glow})`;
  ctx.fillRect(cx - 6, cy - 9, 12, 8);
  ctx.fillStyle = `rgba(206,242,230,${glow * .85})`;        // 滚动的代码行
  for (let i = 0; i < 4; i++) {
    const w = 2 + ((Math.floor(time * 3) + i * 3 + Math.floor(n.seed)) % 8);
    ctx.fillRect(cx - 5, cy - 8 + i * 2, Math.min(w, 10), 1);
  }
  ctx.fillStyle = "rgba(255,255,255,.18)";                  // 屏幕反光
  ctx.fillRect(cx - 6, cy - 9, 12, 1); ctx.fillRect(cx - 6, cy - 9, 1, 8);
  ctx.globalCompositeOperation = "lighter";                 // 洒在桌面上的冷光
  ctx.fillStyle = `rgba(90,170,145,${.10 * glow})`;
  ctx.fillRect(cx - 11, cy - 2, 22, 9);
  ctx.globalCompositeOperation = "source-over";
}

function lighten(hex, amt) {
  const h = hex.replace("#", "");
  const v = [0, 2, 4].map(i => Math.max(0, Math.min(255, parseInt(h.slice(i, i + 2), 16) + amt)));
  return `rgb(${v[0]},${v[1]},${v[2]})`;
}

function drawHair(ctx, n, cx, headTop, mono) {
  const spr = HAIR_SPR[n.hairStyle] || HAIR_SPR.short;
  const key = n.dir === "n" ? "n" : (n.dir === "e" || n.dir === "w") ? "e" : "s";
  const rows = spr[key], W = rows[0].length, flip = n.dir === "w";
  const ox = (W - 1) >> 1;                 // 网格自己居中，13 宽给 9 宽的头，11 宽给 7 宽的瘦脸
  const hi = n._hairHi || (n._hairHi = lighten(n.hair, 26));
  for (let r = 0; r < rows.length; r++) {
    const line = rows[r];
    for (let c = 0; c < W; c++) {
      const ch = line[flip ? W - 1 - c : c];
      if (ch === ".") continue;
      ctx.fillStyle = mono || (ch === "h" ? hi : ch === "d" ? (n._hairSh || (n._hairSh = lighten(n.hair, -38))) : n.hair);
      ctx.fillRect(cx - ox + c, headTop - 3 + r, 1, 1);
    }
  }
}




/* 躺在沙发上睡觉 */
function drawPersonLying(ctx, n, time) {
  const cx = Math.round(n.px), cy = Math.round(n.py);
  // 躺着的腿长跟着体型走：站着 legLen 8 的高个躺下来是 20，矮胖的老墨就该短一截
  const legL = Math.round(personGeom(n).legLen * 2.5);
  ctx.fillStyle = "rgba(0,0,0,.22)"; ctx.fillRect(cx - 17, cy + 1, 16 + legL, 3);
  // 腿（伸向右）
  ctx.fillStyle = "#241a12"; ctx.fillRect(cx + 1, cy - 9, legL, 10);
  ctx.fillStyle = n.pants;   ctx.fillRect(cx + 2, cy - 8, legL - 2, 8);
  ctx.fillStyle = "rgba(255,255,255,.10)"; ctx.fillRect(cx + 2, cy - 8, legL - 2, 1);
  ctx.fillStyle = "rgba(0,0,0,.16)"; ctx.fillRect(cx + 2, cy - 3, legL - 2, 1);
  ctx.fillStyle = C.dark;    ctx.fillRect(cx + legL - 2, cy - 8, 3, 8);
  // 躯干
  ctx.fillStyle = "#241a12"; ctx.fillRect(cx - 11, cy - 11, 14, 12);
  ctx.fillStyle = n.shirt;   ctx.fillRect(cx - 10, cy - 10, 12, 10);
  ctx.fillStyle = "rgba(0,0,0,.10)"; ctx.fillRect(cx - 10, cy - 3, 12, 3);
  ctx.fillStyle = "rgba(255,255,255,.16)"; ctx.fillRect(cx - 10, cy - 10, 12, 1);
  // 搭在肚子上的手
  ctx.fillStyle = n.skin; ctx.fillRect(cx - 5, cy - 6, 5, 3);
  ctx.fillStyle = "rgba(0,0,0,.14)"; ctx.fillRect(cx - 5, cy - 4, 5, 1);
  // 头（枕在左端）
  ctx.fillStyle = "#241a12"; ctx.fillRect(cx - 20, cy - 12, 11, 12);
  ctx.fillStyle = n.skin;    ctx.fillRect(cx - 19, cy - 11, 9, 10);
  ctx.fillStyle = "rgba(0,0,0,.10)"; ctx.fillRect(cx - 19, cy - 3, 9, 2);
  // 侧躺的头发（按发型走）
  ctx.fillStyle = n.hair;
  ctx.fillRect(cx - 19, cy - 12, 9, 4);
  if (n.hairStyle === "spike") {                       // 前刺朝左炸开
    for (const [oy, L] of [[-11, 5], [-8, 6], [-5, 4]]) ctx.fillRect(cx - 19 - L, cy + oy, L, 2);
  } else if (n.hairStyle === "long") {                 // 长发铺在身后
    ctx.fillRect(cx - 22, cy - 12, 3, 12);
    ctx.fillRect(cx - 19, cy - 4, 8, 3);
  } else {                                             // 中长发：贴头一圈
    ctx.fillRect(cx - 21, cy - 11, 2, 8);
    ctx.fillRect(cx - 19, cy - 5, 5, 2);
  }
  ctx.fillStyle = "rgba(255,255,255,.12)"; ctx.fillRect(cx - 19, cy - 12, 9, 1);
  // 闭着的眼 + 嘴
  ctx.fillStyle = "#2a2118"; ctx.fillRect(cx - 16, cy - 6, 3, 1);
  ctx.fillStyle = "rgba(214,120,110,.45)"; ctx.fillRect(cx - 15, cy - 3, 2, 1);
  // Zzz
  for (let i = 0; i < 3; i++) {
    const t2 = (time * .42 + i * .34) % 1;
    pxText(ctx, "Z", Math.round(cx - 14 + t2 * 9), Math.round(cy - 17 - t2 * 13),
           `rgba(255,255,255,${(1 - t2) * .7})`);
  }
  if (n.emote && n.emoteT > 0) drawEmote(ctx, cx + 4, cy - 30, n.emote, time);
}

// 尖脸每一行左右各收进几格：眼睛所在的第 4 行还是满宽，之后一路收到下巴
const FACE_TAPER = [0, 0, 0, 0, 0, 1, 2, 3];

function personGeom(n) {
  const build = n.build || "normal";
  return {
    build,
    // 头都是 9 宽。瘦脸不靠整体缩小，靠 faceTaper 收下半张脸（见 bodyPass）
    // tallThin 和 tall 的 legLen + torsoH 相同 —— 雪兔要和店长一样高，只是瘦一圈
    headHW: 4,
    torsoHW: build === "tall" ? 6 : build === "tallSlim" ? 5 : build === "stout" ? 6
           : build === "chubby" ? 5 : build === "tallThin" ? 3 : build === "tallLean" ? 4
           : build === "slimShort" ? 3 : build === "leanTall" ? 4 : build === "slimStout" ? 4
           : build === "petite" ? 3 : 4,
    legLen:  build === "tall" ? 8 : build === "tallSlim" ? 7 : build === "stout" ? 4
           : build === "chubby" ? 4 : build === "tallThin" ? 8 : build === "tallLean" ? 7
           : build === "slimShort" ? 7 : build === "leanTall" ? 8 : build === "slimStout" ? 4
           : build === "petite" ? 6 : 5,
    torsoH:  build === "tall" ? 10 : build === "tallSlim" ? 8 : build === "stout" ? 7
           : build === "chubby" ? 7 : build === "tallThin" ? 10 : build === "tallLean" ? 8
           : build === "slimShort" ? 8 : build === "leanTall" ? 10 : build === "slimStout" ? 7
           : build === "petite" ? 7 : 7,
    legW:    build === "stout" || build === "chubby" ? 3 : 2,
  };
}

/* 画一遍身体。mono 非空时整体涂成同一色 —— 用来做贴合轮廓的描边。 */
function bodyPass(ctx, n, g, cx, base, time, mono) {
  const moving = n.path && n.path.length > 0;
  const walk = moving ? Math.floor(time * 7 + n.seed) % 4 : 0;
  const { torsoHW: hw, headHW: hhw, legLen, torsoH, legW, build } = g;
  const bodyBase = n.sitting ? base - 6 : base - legLen;   // 坐着时臀部抬到椅面上，别贴地显矮
  const hy = bodyBase - torsoH - 7;               // 头顶
  const legL = build === "stout" ? cx - 4 : cx - 3;
  const F = c => { ctx.fillStyle = mono || c; };

  if (!n.sitting) {                              // 腿
    const la = walk === 1 ? -1 : walk === 3 ? 1 : 0;
    F(n.skirt ? n.skin : n.pants);
    ctx.fillRect(legL, base - legLen + Math.max(0, la), legW, legLen - Math.abs(la));
    ctx.fillRect(cx + 1, base - legLen + Math.max(0, -la), legW, legLen - Math.abs(la));
    F(C.dark);
    ctx.fillRect(legL, base - 1, legW, 1); ctx.fillRect(cx + 1, base - 1, legW, 1);
    if (n.ripped && !mono) {                     // 破洞牛仔裤：膝盖处露出皮肤
      ctx.fillStyle = n.skin;
      ctx.fillRect(legL, base - legLen + 2, legW, 1);
      ctx.fillRect(cx + 1, base - legLen + 3, legW, 1);
    }
  }

  F(n.shirt);                                    // 躯干
  ctx.fillRect(cx - hw, bodyBase - torsoH, hw * 2 + 1, torsoH);
  if (n.robe) {                                  // 长袍：从肩一直垂到脚踝，盖住腿
    const rt = bodyBase - torsoH, rh = base - rt - 1;
    F(n.shirt); ctx.fillRect(cx - hw, rt, hw * 2 + 1, rh);
    if (!mono) {
      ctx.fillStyle = "rgba(0,0,0,.20)"; ctx.fillRect(cx + hw - 1, rt, 2, rh);
      ctx.fillStyle = "rgba(255,255,255,.06)"; ctx.fillRect(cx - hw, rt, 1, rh);
      ctx.fillStyle = "rgba(0,0,0,.18)"; ctx.fillRect(cx, rt + 3, 1, rh - 4);   // 门襟
    }
  }
  if (build === "stout") {                       // 溜肩：把两个上角削掉
    ctx.fillRect(cx - hw, bodyBase - torsoH, 2, 1);
    ctx.fillRect(cx + hw - 1, bodyBase - torsoH, 2, 1);
  }
  if (!mono) {
    if (build === "stout") {
      ctx.fillStyle = "rgba(255,255,255,.07)";
      ctx.fillRect(cx - hw + 2, bodyBase - 5, hw * 2 - 3, 4);
    } else if (build === "tallSlim") {           // 收腰
      ctx.fillStyle = "rgba(0,0,0,.16)";
      ctx.fillRect(cx - hw, bodyBase - 3, 1, 3); ctx.fillRect(cx + hw, bodyBase - 3, 1, 3);
    }
    ctx.fillStyle = "rgba(0,0,0,.16)"; ctx.fillRect(cx + hw - 1, bodyBase - torsoH, 2, torsoH);
    ctx.fillStyle = "rgba(255,255,255,.13)"; ctx.fillRect(cx - hw, bodyBase - torsoH, 1, torsoH);
    if (n.collar) {                              // 衬衫领口 + 门襟
      ctx.fillStyle = "rgba(0,0,0,.22)";
      ctx.fillRect(cx - 2, bodyBase - torsoH, 1, 3); ctx.fillRect(cx + 1, bodyBase - torsoH, 1, 3);
      ctx.fillStyle = "rgba(0,0,0,.14)";
      for (let i = 3; i < torsoH - 1; i += 3) ctx.fillRect(cx, bodyBase - torsoH + i, 1, 1);
    }
    if (n.apron) {                             // 围裙：只盖下半身，留出上衣
      ctx.fillStyle = "#e6ddc8"; ctx.fillRect(cx - hw + 2, bodyBase - 4, hw * 2 - 3, 4);
      ctx.fillStyle = "#cdc2a8"; ctx.fillRect(cx - hw + 2, bodyBase - 4, hw * 2 - 3, 1);
      ctx.fillStyle = "#e6ddc8";                 // 背带
      ctx.fillRect(cx - 2, bodyBase - torsoH + 1, 1, torsoH - 5);
      ctx.fillRect(cx + 2, bodyBase - torsoH + 1, 1, torsoH - 5);
    }
    if (n.hoodie) {                            // 卫衣：敞口露出米色内搭，领口两侧堆一卷帽子，中间一条拉链
      const inner = n.inner || "#e7ddc8";
      ctx.fillStyle = inner;                     // 内搭：胸口一块米色，两肩各留一点
      ctx.fillRect(cx - 1, bodyBase - torsoH + 1, 3, 3);
      ctx.fillRect(cx, bodyBase - torsoH + 4, 1, 2);
      ctx.fillStyle = "rgba(0,0,0,.20)";         // 拉链门襟
      ctx.fillRect(cx, bodyBase - torsoH + 6, 1, torsoH - 7);
      ctx.fillStyle = lighten(n.shirt, -20);     // 帽卷：脖子两侧各一小坨
      ctx.fillRect(cx - 3, bodyBase - torsoH, 2, 2); ctx.fillRect(cx + 2, bodyBase - torsoH, 2, 2);
      ctx.fillStyle = "rgba(255,255,255,.10)"; ctx.fillRect(cx - hw + 1, bodyBase - 4, hw * 2 - 1, 1);
    }
  }
  if (n.bag) {                                   // 斜挎带 + 包
    F("#4a3728");
    for (let i = 0; i < torsoH; i++)
      ctx.fillRect(cx - hw + Math.round(i * (hw * 2 - 1) / torsoH), bodyBase - torsoH + i, 2, 1);
    const bx = n.dir === "w" ? cx - hw - 4 : cx + hw - 1;
    F("#5c4630"); ctx.fillRect(bx, bodyBase - 5, 5, 6);
    if (!mono) { ctx.fillStyle = "#725640"; ctx.fillRect(bx, bodyBase - 5, 5, 2); }
  }

  if (n.skirt) {                                 // A 字裙：三段递宽，压在上衣下摆之上
    F(n.skirt);
    ctx.fillRect(cx - hw, bodyBase - 4, hw * 2 + 1, 2);
    ctx.fillRect(cx - hw - 1, bodyBase - 2, hw * 2 + 3, 2);
    ctx.fillRect(cx - hw - 2, bodyBase, hw * 2 + 5, 1);
    if (!mono) {
      ctx.fillStyle = "rgba(255,255,255,.18)"; ctx.fillRect(cx - hw, bodyBase - 4, hw * 2 + 1, 1);
      ctx.fillStyle = "rgba(0,0,0,.14)";
      ctx.fillRect(cx + hw - 1, bodyBase - 4, 2, 2); ctx.fillRect(cx + hw, bodyBase - 2, 2, 2);
      ctx.fillStyle = "rgba(0,0,0,.10)";           // 褶
      ctx.fillRect(cx - 2, bodyBase - 3, 1, 4); ctx.fillRect(cx + 2, bodyBase - 3, 1, 4);
    }
  }

  if (n.spider && !mono) {                       // 蜘蛛侠战衣：胸口一只蜘蛛 + 蛛网格
    ctx.fillStyle = "rgba(0,0,0,.30)";
    for (let i = 1; i < torsoH - 1; i += 3) ctx.fillRect(cx - hw + 1, bodyBase - torsoH + i, hw * 2 - 1, 1);
    for (let i = -hw + 2; i <= hw - 1; i += 3) ctx.fillRect(cx + i, bodyBase - torsoH + 1, 1, torsoH - 2);
    ctx.fillStyle = "#141018";                   // 胸标
    ctx.fillRect(cx - 1, bodyBase - torsoH + 3, 3, 2);
    ctx.fillRect(cx - 2, bodyBase - torsoH + 2, 1, 1); ctx.fillRect(cx + 2, bodyBase - torsoH + 2, 1, 1);
    ctx.fillRect(cx - 2, bodyBase - torsoH + 5, 1, 1); ctx.fillRect(cx + 2, bodyBase - torsoH + 5, 1, 1);
  }

  if (n.firework && !mono && n.dir !== "n") {    // 上衣胸口：一朵烟花
    const fx = cx, fy = bodyBase - torsoH + Math.max(3, (torsoH >> 1) - 1);
    for (const [c, dx, dy] of [["#ff6b6b", 0, -2], ["#ffd24a", 2, -1], ["#5fd0ff", 2, 1], ["#8affa0", 0, 2], ["#ff8ad6", -2, 1], ["#c9a4ff", -2, -1]]) {
      ctx.fillStyle = c;
      ctx.fillRect(fx + dx, fy + dy, 1, 1);
      ctx.fillRect(fx + Math.sign(dx), fy + Math.sign(dy), 1, 1);
    }
    ctx.fillStyle = "#ffe9a8"; ctx.fillRect(fx, fy, 1, 1);
  }
  if (n.starry && !mono && n.dir !== "n") {      // 上衣胸口：梵高《星夜》
    const sx0 = cx - 3, sy0 = bodyBase - torsoH + 3, sw = 7, sh = Math.min(6, torsoH - 4);
    ctx.fillStyle = "#16265f"; ctx.fillRect(sx0, sy0, sw, sh);
    ctx.fillStyle = "#33509e"; ctx.fillRect(sx0, sy0 + 1, sw, 1); ctx.fillRect(sx0, sy0 + sh - 2, sw, 1);
    ctx.fillStyle = "rgba(120,160,230,.6)"; ctx.fillRect(sx0 + 1, sy0 + 2, 4, 1);
    ctx.fillStyle = "#f2d24a"; ctx.fillRect(sx0 + 1, sy0 + 1, 1, 1); ctx.fillRect(sx0 + 4, sy0, 1, 1);
    ctx.fillStyle = "#f7e58a"; ctx.fillRect(sx0 + sw - 2, sy0 + 1, 1, 1);       // 月
    ctx.fillStyle = "rgba(247,229,138,.6)"; ctx.fillRect(sx0 + sw - 3, sy0 + 2, 1, 1);
  }

  // 长袖：战衣 / 长袍 的胳膊跟着上衣走，只在手腕露出一截皮肤
  F(n.spider || n.robe ? n.shirt : n.skin);      // 手臂
  const swing = moving ? (walk === 1 ? 1 : walk === 3 ? -1 : 0) : 0;
  ctx.fillRect(cx - hw - 1, bodyBase - torsoH + 2 + swing, 1, 4);
  ctx.fillRect(cx + hw + 1, bodyBase - torsoH + 2 - swing, 1, 4);
  if (n.spider || n.robe) {                      // 长袖露出的手腕
    F(n.skin);
    ctx.fillRect(cx - hw - 1, bodyBase - torsoH + 6 + swing, 1, 1);
    ctx.fillRect(cx + hw + 1, bodyBase - torsoH + 6 - swing, 1, 1);
  }

  F(n.skin);                                     // 头
  if (n.faceTaper) {
    // 尖脸：颧骨以上保持满宽，往下每行收一格，收出一个下巴尖
    for (let r = 0; r < 8; r++) {
      const t = FACE_TAPER[r];
      ctx.fillRect(cx - hhw + t, hy + r, (hhw - t) * 2 + 1, 1);
    }
    if (!mono) {
      ctx.fillStyle = "rgba(0,0,0,.10)";
      for (let r = 0; r < 8; r++) {
        const t = FACE_TAPER[r];
        ctx.fillRect(cx + hhw - t - 1, hy + r, t ? 1 : 2, 1);
      }
    }
  } else {
    ctx.fillRect(cx - hhw, hy, hhw * 2 + 1, 8);
    if (!mono) { ctx.fillStyle = "rgba(0,0,0,.10)"; ctx.fillRect(cx + hhw - 1, hy, 2, 8); }
  }

  if (!n.mask) drawHair(ctx, n, cx, hy, mono);   // 蜘蛛侠面具盖住头发
  if (n.hat && n.cap) drawCap(ctx, n, cx, hy, hhw, mono);
  else if (n.hat) { F(n.hatColor); ctx.fillRect(cx - hhw - 1, hy - 2, hhw * 2 + 3, 2); ctx.fillRect(cx - 3, hy - 6, 7, 4); }

  if (!mono) {                                   // 五官只在正式那遍画
    const blink = ((time * 1000 + n.seed * 977) % 4200) < 130;
    // smallEyes：本来就只有 1px 高，眨眼时干脆闭成一条缝
    // bigEyes：睁眼时宽 2 高 2（常规是 1 宽），眼里再点一颗高光；眨眼压回一条缝
    const big = n.bigEyes && !blink;
    const eh = n.smallEyes ? 1 : blink ? 1 : 2, ey = hy + 4 + (blink ? 1 : 0);
    const ew = big ? 2 : 1, elx = big ? cx - 3 : cx - 2;   // 左眼靠外扩一格，右眼往内扩
    if (n.eyeShadow && n.dir !== "n") {         // 青绿眼影
      ctx.fillStyle = n.eyeShadow;
      if (n.dir !== "e") ctx.fillRect(cx - 3, ey - 1, 2, 2);
      if (n.dir !== "w") ctx.fillRect(cx + 2, ey - 1, 2, 2);
    }
    ctx.fillStyle = n.eyeColor || "#2a2118";
    if (n.dir === "s") { ctx.fillRect(elx, ey, ew, eh); ctx.fillRect(cx + 2, ey, ew, eh); }
    else if (n.dir === "e") { ctx.fillRect(cx + 2, ey, ew, eh); }
    else if (n.dir === "w") { ctx.fillRect(elx, ey, ew, eh); }
    if (n.eyebrow && n.dir !== "n") {           // 眉毛：两眼上方各一道
      ctx.fillStyle = "#3a2c20";
      if (n.dir !== "e") ctx.fillRect(cx - 3, hy + 2, 2, 1);
      if (n.dir !== "w") ctx.fillRect(cx + 2, hy + 2, 2, 1);
    }
    if (n.lashes && !blink && n.dir !== "n") {
      ctx.fillStyle = "#2a2118";
      if (n.dir !== "e") ctx.fillRect(cx - 3, ey - 1, 1, 1);
      if (n.dir !== "w") ctx.fillRect(cx + 3, ey - 1, 1, 1);
      ctx.fillStyle = "rgba(178,88,104,.45)"; ctx.fillRect(cx - 1, hy + 7, 2, 1);
    }
    if (n.dir !== "n") {
      // 尖脸在这一行已经收窄了，腮红跟着收，别飘到脸外面去
      ctx.fillStyle = "rgba(214,120,110,.45)";
      const bw = n.faceTaper ? 1 : 2, bx = n.faceTaper ? 2 : 3;
      ctx.fillRect(cx - bx, hy + 6, bw, 1); ctx.fillRect(cx + bx - bw + 1, hy + 6, bw, 1);
    }
    // 传没被眨眼位移过的基准行：镜架是架在鼻梁上的，不该跟着眼皮上下跳
    if (n.glasses && !n.mask && n.dir !== "n") drawGlasses(ctx, n, cx, hy + 4);
  }
  if (n.mask) drawSpiderMask(ctx, n, cx, hy, hhw, mono);   // 面具盖在五官之上

  if (n.laptop) drawLaptop(ctx, n, cx, bodyBase, torsoH, hw, time, mono);
}

// 蜘蛛侠面具：红色头罩 + 蛛网 + 白色大眼罩（跟随尖脸收窄、按朝向出眼）
function drawSpiderMask(ctx, n, cx, hy, hhw, mono) {
  ctx.fillStyle = mono || "#c33027";
  // 圆顶：补上头发那段高度，别让头显得扁
  ctx.fillRect(cx - 2, hy - 3, 5, 1);
  ctx.fillRect(cx - hhw + 1, hy - 2, hhw * 2 - 1, 1);
  ctx.fillRect(cx - hhw, hy - 1, hhw * 2 + 1, 1);
  for (let r = 0; r < 8; r++) {                  // 罩住整颗头，尖脸下半收窄
    const t = n.faceTaper ? FACE_TAPER[r] : 0;
    ctx.fillRect(cx - hhw + t, hy + r, (hhw - t) * 2 + 1, 1);
  }
  if (mono) return;
  ctx.fillStyle = "rgba(255,255,255,.10)"; ctx.fillRect(cx - hhw + 1, hy - 2, hhw, 1);  // 顶光
  ctx.fillStyle = "rgba(0,0,0,.30)";             // 蛛网：一竖 + 两横 + 放射
  ctx.fillRect(cx, hy - 2, 1, 10);
  ctx.fillRect(cx - hhw + 1, hy + 1, hhw * 2 - 1, 1);
  ctx.fillRect(cx - 2, hy + 6, 5, 1);
  ctx.fillRect(cx - hhw + 1, hy + 3, 2, 1); ctx.fillRect(cx + hhw - 2, hy + 3, 2, 1);
  const eye = (ox, mir) => {                      // 斜白眼 + 黑边
    ctx.fillStyle = "#0b0b0d"; ctx.fillRect(ox, hy + 2, 3, 4);
    ctx.fillStyle = "#dfeaf0";
    if (!mir) { ctx.fillRect(ox, hy + 3, 2, 1); ctx.fillRect(ox + 1, hy + 4, 2, 1); }
    else { ctx.fillRect(ox + 1, hy + 3, 2, 1); ctx.fillRect(ox, hy + 4, 2, 1); }
  };
  if (n.dir === "n") return;                      // 背面只有红罩 + 网
  if (n.dir === "e") eye(cx + 1, true);
  else if (n.dir === "w") eye(cx - 4, false);
  else { eye(cx - 4, false); eye(cx + 2, true); }
}

/* 黑framed眼镜：正面两个方框 + 鼻梁，侧面只画朝向那一侧的一片镜片 */
function drawGlasses(ctx, n, cx, ey) {
  const col = n.glassColor || "#1d1a1f";
  ctx.fillStyle = col;
  if (n.glassThin) {
    // 细框：金属色而不是黑色 —— 眼珠本来就是深色，深色镜架画在同一行会连成一条黑带。
    // 浅一档的钢色夹在眼睛两侧，才看得出是两片镜片加一根鼻梁。
    if (n.dir === "s") {
      for (const dx of [-3, -1, 0, 1, 3]) ctx.fillRect(cx + dx, ey, 1, 1);
    } else {
      const s = n.dir === "e" ? 1 : -1;
      for (const dx of [1, 3]) ctx.fillRect(cx + s * dx, ey, 1, 1);
      ctx.fillRect(cx + s * 4, ey - 1, 1, 1);        // 镜腿往耳朵方向翘一格
    }
    return;
  }
  if (n.dir === "s") {
    for (const lx of [cx - 4, cx + 1]) {
      ctx.fillRect(lx, ey - 2, 4, 1); ctx.fillRect(lx, ey + 2, 4, 1);
      ctx.fillRect(lx, ey - 1, 1, 3); ctx.fillRect(lx + 3, ey - 1, 1, 3);
    }
    ctx.fillRect(cx, ey - 1, 1, 1);                // 鼻梁
    ctx.fillStyle = "rgba(226,244,255,.30)";       // 镜片反光
    ctx.fillRect(cx - 3, ey - 1, 1, 1); ctx.fillRect(cx + 2, ey - 1, 1, 1);
  } else {
    const s = n.dir === "e" ? 1 : -1, lx = n.dir === "e" ? cx + 1 : cx - 4;
    ctx.fillRect(lx, ey - 2, 4, 1); ctx.fillRect(lx, ey + 2, 4, 1);
    ctx.fillRect(lx, ey - 1, 1, 3); ctx.fillRect(lx + 3, ey - 1, 1, 3);
    ctx.fillRect(cx + s * 5, ey - 1, 1, 1);        // 镜腿
    ctx.fillStyle = "rgba(226,244,255,.30)";
    ctx.fillRect(lx + 1, ey - 1, 1, 1);
  }
}

function drawPerson(ctx, n, time) {
  if (n.lying) return drawPersonLying(ctx, n, time);
  const g = personGeom(n);
  const cx = Math.round(n.px), py = Math.round(n.py);
  const base = py + (n.sitting ? 3 : 0);

  ctx.fillStyle = "rgba(0,0,0,.24)";             // 影子
  ctx.fillRect(cx - g.torsoHW, py - 1, g.torsoHW * 2 + 1, 3);
  ctx.fillRect(cx - g.torsoHW - 1, py, g.torsoHW * 2 + 3, 1);

  // 贴合轮廓的 1px 描边：整个身体用深色画四遍，各偏一格
  for (const [ox, oy] of [[-1, 0], [1, 0], [0, -1], [0, 1]])
    bodyPass(ctx, n, g, cx + ox, base + oy, time, "#241a12");
  bodyPass(ctx, n, g, cx, base, time, null);

  if (n.emote && n.emoteT > 0)
    drawEmote(ctx, cx, base - g.legLen - g.torsoH - 22, n.emote, time);
}

function drawEmote(ctx, cx, y, kind, time) {
  const w = 14, h = 12, x = cx - 7;
  ctx.fillStyle = "rgba(0,0,0,.25)"; ctx.fillRect(x + 1, y + 1, w, h);
  ctx.fillStyle = "#f6f1e4"; ctx.fillRect(x, y, w, h);
  ctx.fillRect(cx - 2, y + h, 3, 2); ctx.fillRect(cx - 1, y + h + 2, 2, 1);
  ctx.fillStyle = "#cfc4a8"; ctx.fillRect(x, y, w, 1); ctx.fillRect(x, y + h - 1, w, 1);
  const ix = x + 4, iy = y + 3;
  switch (kind) {
    case "dice":
      ctx.fillStyle = "#3a3025"; ctx.fillRect(ix, iy, 7, 7);
      ctx.fillStyle = "#f6f1e4";
      { const p = Math.floor(time * 6) % 3;
        ctx.fillRect(ix + 3, iy + 3, 1, 1);
        if (p > 0) { ctx.fillRect(ix + 1, iy + 1, 1, 1); ctx.fillRect(ix + 5, iy + 5, 1, 1); }
        if (p > 1) { ctx.fillRect(ix + 5, iy + 1, 1, 1); ctx.fillRect(ix + 1, iy + 5, 1, 1); } }
      break;
    case "heart":
      ctx.fillStyle = "#d8556a";
      ctx.fillRect(ix + 1, iy + 1, 2, 2); ctx.fillRect(ix + 4, iy + 1, 2, 2);
      ctx.fillRect(ix, iy + 2, 7, 2); ctx.fillRect(ix + 1, iy + 4, 5, 1);
      ctx.fillRect(ix + 2, iy + 5, 3, 1); ctx.fillRect(ix + 3, iy + 6, 1, 1);
      break;
    case "meeple":
      ctx.fillStyle = "#3c7fb1";
      ctx.fillRect(ix + 2, iy, 3, 2); ctx.fillRect(ix + 1, iy + 2, 5, 2);
      ctx.fillRect(ix, iy + 3, 7, 1); ctx.fillRect(ix + 1, iy + 4, 2, 3); ctx.fillRect(ix + 4, iy + 4, 2, 3);
      break;
    case "coffee":
      ctx.fillStyle = "#e8e2d2"; ctx.fillRect(ix, iy + 2, 6, 5);
      ctx.fillStyle = "#6b4226"; ctx.fillRect(ix + 1, iy + 3, 4, 2);
      ctx.fillStyle = "#e8e2d2"; ctx.fillRect(ix + 6, iy + 3, 1, 2);
      ctx.fillStyle = "rgba(120,110,100,.6)"; ctx.fillRect(ix + 2, iy, 1, 2); ctx.fillRect(ix + 4, iy, 1, 1);
      break;
    case "cookie":
      ctx.fillStyle = "#c9964e"; ctx.fillRect(ix + 1, iy + 1, 5, 6); ctx.fillRect(ix, iy + 2, 7, 4);
      ctx.fillStyle = "#6b4226";
      ctx.fillRect(ix + 2, iy + 3, 1, 1); ctx.fillRect(ix + 4, iy + 5, 1, 1); ctx.fillRect(ix + 3, iy + 2, 1, 1);
      break;
    case "tv":
      ctx.fillStyle = "#3a3025"; ctx.fillRect(ix, iy + 1, 7, 6);
      ctx.fillStyle = Math.sin(time * 8) > 0 ? "#8fc6e0" : "#5f9ab5"; ctx.fillRect(ix + 1, iy + 2, 5, 4);
      break;
    case "think": pxText(ctx, "?", ix + 2, iy + 1, "#3a3025"); break;
    case "bang":  pxText(ctx, "!", ix + 2, iy + 1, "#c94f3d"); break;
    case "note":
      ctx.fillStyle = "#4e9d5c"; ctx.fillRect(ix + 4, iy, 2, 6); ctx.fillRect(ix + 1, iy + 4, 4, 3);
      break;
  }
}

/* ══ 猫 ═══════════════════════════════════════════════ */
const cat = { px: 24 * TW, py: 18 * TW, path: null, nap: 6, dir: "s", tail: 0 };
function updateCat(dt) {
  if (cat.nap > 0) { cat.nap -= dt; cat.tail += dt; return; }
  if (!cat.path || !cat.path.length) {
    let g, tries = 0;
    do { g = { x: ri(2, GW - 3), y: ri(3, GH - 2) }; tries++; } while (!walkable(g.x, g.y) && tries < 60);
    cat.path = findPath(Math.round((cat.px - TW / 2) / TW), Math.round((cat.py - TW + 2) / TW), g.x, g.y) || [];
    if (!cat.path.length) { cat.nap = ri(5, 14); return; }
  }
  const nd = cat.path[0];
  const tx = nd.x * TW + TW / 2, ty = nd.y * TW + TW - 2;
  const dx = tx - cat.px, dy = ty - cat.py, d = Math.hypot(dx, dy);
  const sp = 22 * dt;
  cat.dir = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? "e" : "w") : (dy > 0 ? "s" : "n");
  if (d <= sp) { cat.px = tx; cat.py = ty; cat.path.shift(); if (!cat.path.length) cat.nap = ri(6, 16); }
  else { cat.px += dx / d * sp; cat.py += dy / d * sp; }
  cat.tail += dt;
}
function drawCat(ctx, time) {
  const x = Math.round(cat.px), y = Math.round(cat.py);
  const napping = cat.nap > 0;
  const body = "#d8a05a", dk = "#a8763c";
  ctx.fillStyle = "rgba(0,0,0,.20)"; ctx.fillRect(x - 5, y - 1, 11, 2);
  if (napping) {
    ctx.fillStyle = body; ctx.fillRect(x - 5, y - 5, 11, 5); ctx.fillRect(x - 4, y - 7, 6, 3);
    ctx.fillStyle = dk;   ctx.fillRect(x - 5, y - 5, 11, 1);
    ctx.fillStyle = body; ctx.fillRect(x - 4, y - 9, 2, 2); ctx.fillRect(x, y - 9, 2, 2);
    ctx.fillStyle = "#3a2a18"; ctx.fillRect(x - 3, y - 6, 2, 1); ctx.fillRect(x, y - 6, 2, 1);
    const t2 = (time * .5) % 1;
    pxText(ctx, "-", x + 6, y - 12 - t2 * 5, `rgba(255,255,255,${(1 - t2) * .5})`);
  } else {
    ctx.fillStyle = body; ctx.fillRect(x - 5, y - 7, 9, 6);
    ctx.fillStyle = dk;
    ctx.fillRect(x - 4, y - 1, 2, 1); ctx.fillRect(x + 1, y - 1, 2, 1);
    const tw = Math.round(Math.sin(cat.tail * 6) * 2);
    ctx.fillRect(x + (cat.dir === "w" ? 4 : -6), y - 9 + tw, 2, 4);
    const hx = cat.dir === "w" ? x - 8 : x + 3;
    ctx.fillStyle = body; ctx.fillRect(hx, y - 10, 5, 5);
    ctx.fillRect(hx, y - 13, 2, 3); ctx.fillRect(hx + 3, y - 13, 2, 3);
    ctx.fillStyle = "#3a2a18";
    ctx.fillRect(hx + 1, y - 8, 1, 1); ctx.fillRect(hx + 3, y - 8, 1, 1);
  }
}

    staff: !!(c && c.resident),     // 常驻角色：不计入客流上限、不会被清掉
    build: c && c.build ? c.build : "normal",
    collar: !!(c && c.collar),
    apron: !!(c && c.apron),
    bag: !!(c && c.bag),
    laptop: !!(c && c.laptop),
    cap: !!(c && c.cap),
    hairStyle: c ? c.hairStyle || null : null,
    skin: c ? c.skin : rnd(SKIN),
    hair: c ? c.hair : rnd(HAIR),
    shirt: c ? c.shirt : rnd(SHIRT),
    pants: c ? c.pants : rnd(PANTS),
