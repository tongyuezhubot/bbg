const emote = (n, kind, dur = 2.6) => { n.emote = kind; n.emoteT = dur; };
const tileOf = n => ({ x: Math.round((n.px - TW / 2) / TW), y: Math.round((n.py - TW + 2) / TW) });
function goTo(n, tx, ty) {
  const t = tileOf(n);
  const p = findPath(t.x, t.y, tx, ty);
  n.path = p || [];
  // 起步这一帧就转正，否则上一个姿势的侧身朝向会在画面上留一帧
  if (n.path.length) {
    const nd = n.path[0];
    n.dir = Math.abs(nd.x - t.x) >= Math.abs(nd.y - t.y) ? "s" : (nd.y > t.y ? "s" : "n");
  }
  return !!p;
}
const NUDGE = { n: [0, -4], s: [0, 4], e: [4, 0], w: [-4, 0] };
// 人物只用正面/背面：侧身只画得出一只眼睛，跟这套平面画风不搭。
// 站位、落座的偏移照旧用真实朝向算，改的只是画出来的那一面。
const flatDir = d => (d === "e" || d === "w") ? "s" : d;
function snapSeat(n, cell, dir) {
  const [dx, dy] = NUDGE[dir];
  n.px = cell.x * TW + TW / 2 + dx;
  n.py = cell.y * TW + TW - 2 + dy;
  n.dir = flatDir(dir);
  n.sitting = true;
}
// 沙发是实心的：从坐者正面那一排里挑一个离目标座位最近的落脚点
const FRONT = { n: [0, -1], s: [0, 1], e: [1, 0], w: [-1, 0] };
function sofaApproach(seat) {
  const f = FRONT[seat.dir];
  const cands = seat.sofa.seats
    .map(s => ({ x: s.x + f[0], y: s.y + f[1] }))
    .filter(a => walkable(a.x, a.y));
  if (!cands.length) return null;
  const dist = a => Math.abs(a.x - seat.x) + Math.abs(a.y - seat.y);
  return cands.reduce((best, a) => dist(a) < dist(best) ? a : best);
}
function pickShelfSpot() {
  const pool = [];
  for (const s of shelves) for (let i = 0; i < s.w; i++) {
    if (walkable(s.x + i, s.y + 1)) pool.push({ x: s.x + i, y: s.y + 1, dir: "n" });
    if (walkable(s.x + i, s.y - 1)) pool.push({ x: s.x + i, y: s.y - 1, dir: "s" });
  }
  for (const s of wallShelves) for (let i = 0; i < s.h; i++) {
    const ax = s.dir === "w" ? s.x + 1 : s.x - 1;
    if (walkable(ax, s.y + i)) pool.push({ x: ax, y: s.y + i, dir: s.dir === "w" ? "w" : "e" });
  }
  for (const w of IWALL_V) for (let i = 0; i < w.h; i++) {
    if (walkable(w.x + 1, w.y + i)) pool.push({ x: w.x + 1, y: w.y + i, dir: "w" });
    if (walkable(w.x - 1, w.y + i)) pool.push({ x: w.x - 1, y: w.y + i, dir: "e" });
  }
  for (const w of IWALL_H) for (let i = 0; i < w.w; i++)
    if (walkable(w.x + i, w.y + 1)) pool.push({ x: w.x + i, y: w.y + 1, dir: "n" });
  return pool.length ? rnd(pool) : null;
}
function pickChair() {
  const cands = [];
  for (const t of TABLES) {
    const free = t.chairs.filter(c => !c.by);
    if (!free.length) continue;
    const seated = t.chairs.length - free.length;
    const weight = seated === 0 ? 1 : seated < 4 ? 5 : 2;
    for (let i = 0; i < weight; i++) cands.push(rnd(free));
  }
  return cands.length ? rnd(cands) : null;
}
function pickSeat() {
  const free = SOFAS.flatMap(s => s.seats).filter(s => !s.by);
  return free.length ? rnd(free) : null;
}

/* ══ 牌搭子：kk / 店长 / 小熊 / 老墨 时常凑一桌开局 ═══════ */
const GANG = ["owner", "bear", "mo", "kk"];
let gangT = 25, gang = null;
function leaveActivity(n) {                     // 从当前的坐/躺/占座里抽身
  if (n.chair) { n.chair.by = null; n.chair = null; }
  if (n.seat) { n.seat.by = null; n.seat = null; }
  if (n.napSeats && n.napSeats.length) n.napSeats.forEach(s => (s.by = null));
  n.napSeats = []; n.napSofa = null; n.lying = false; n.sitting = false;
  n.emote = null; n.emoteT = 0; n.path = [];
}
function updateGangMember(n, dt) {
  const ch = n.gangSeat;
  if (!ch) return;
  if (!n.sitting) {
    const t = tileOf(n);
    if (t.x === ch.x && t.y === ch.y) {         // 到位坐下开局
      snapSeat(n, ch, ch.dir);
      n.chair = ch;                             // 让排序 / 桌面逻辑照常识别
      if (!ch.t.game) ch.t.game = rnd(GAMES);
    } else goTo(n, ch.x, ch.y);
    return;
  }
  if (n.emoteT <= 0 && Math.random() < dt * .6)
    emote(n, rnd(["dice", "meeple", "heart", "think", "bang", "note"]));
}
function endGang() {
  if (!gang) return;
  for (const n of gang.members) {
    if (n.gangSeat) { n.gangSeat.by = null; n.gangSeat = null; }
    n.chair = null; n.sitting = false; n.timer = 0; n.task = null; n.state = "seek";
  }
  if (gang.table.chairs.every(c => !c.by)) gang.table.game = null;
  gang = null; gangT = ri(70, 140);
}
function updateGang(dt) {
  if (gang) {
    if (!gang.table.game) gang.table.game = rnd(GAMES);
    gang.timer -= dt;
    if (gang.timer <= 0) endGang();
    return;
  }
  gangT -= dt;
  if (gangT > 0) return;
  const members = GANG.map(k => people.find(p => p.castKey === k && !p.dead && p.state !== "away"));
  if (members.some(m => !m)) { gangT = 8; return; }          // 有人不在，晚点再约
  const table = TABLES.find(t => t.chairs.filter(c => !c.by).length >= members.length);
  if (!table) { gangT = 12; return; }
  const free = table.chairs.filter(c => !c.by).slice(0, members.length);
  members.forEach((n, i) => {
    leaveActivity(n);
    free[i].by = n; n.gangSeat = free[i]; n.task = "gang"; n.state = "gang"; n.timer = 0;
  });
  table.game = table.game || rnd(GAMES);
  gang = { table, members, timer: ri(50, 95) };
}

function update(n, dt, time) {
  if (n.emoteT > 0) n.emoteT -= dt; else n.emote = null;

  if (n.path && n.path.length) {
    const nd = n.path[0];
    const tx = nd.x * TW + TW / 2, ty = nd.y * TW + TW - 2;
    const dx = tx - n.px, dy = ty - n.py, d = Math.hypot(dx, dy);
    const sp = (n.staff ? 34 : 27) * dt;
    const horiz = Math.abs(dx) > Math.abs(dy);
    // 全店统一：左右移动一律平移，保持正面，不转侧身。
    // 站定后的朝向（看货架、面对座位、站柜台）不受影响，那边照样有侧身。
    n.dir = horiz ? "s" : (dy > 0 ? "s" : "n");
    if (d <= sp) { n.px = tx; n.py = ty; n.path.shift(); }
    else { n.px += dx / d * sp; n.py += dy / d * sp; }
    return;
  }
  if (n.gangSeat) return updateGangMember(n, dt);   // 组队玩桌游时接管一切逻辑
  n.timer -= dt;
  switch (n.role) {
    case "owner":  return updateOwner(n, dt);
    case "napper": return updateNapper(n, dt);
    case "coder":  return updateCoder(n, dt);
    case "clerk":  return updateStaff(n, dt);
  }

  switch (n.state) {
    case "enter":
      if (n.timer <= 0) {
        const spot = pickShelfSpot();
        n.browseAt = spot;
        if (spot && goTo(n, spot.x, spot.y)) { n.state = "browse"; n.timer = ri(7, 15); }
        else { n.state = "seek"; n.timer = 0; }
      }
      break;

    case "browse":
      if (n.browseAt) n.dir = flatDir(n.browseAt.dir);
      if (n.emoteT <= 0 && Math.random() < dt * .7) emote(n, rnd(["think", "meeple", "heart", "note"]));
      if (n.timer <= 0) {
        n.pickedGame = rnd(GAMES);
        n.state = (!n.lounged && Math.random() < .35) ? "toSofa" : "seek";
        n.timer = 0;
      }
      break;

    case "toSofa": {
      const seat = pickSeat();
      if (!seat) { n.state = "seek"; n.timer = 0; break; }
      const app = sofaApproach(seat);
      if (app && goTo(n, app.x, app.y)) { seat.by = n; n.seat = seat; n.state = "sitSofa"; }
      else { n.state = "seek"; n.timer = 0; }
      break;
    }
    case "sitSofa":
      if (!n.seat) { n.state = "seek"; n.timer = 0; break; }
      snapSeat(n, n.seat, n.seat.dir);
      n.state = "lounge"; n.timer = ri(14, 30);
      break;

    case "lounge":
      if (!n.seat) { n.sitting = false; n.state = "seek"; n.timer = 0; break; }
      if (n.emoteT <= 0 && Math.random() < dt * .5) emote(n, rnd(["tv", "coffee", "heart", "note"]));
      if (n.timer <= 0) {
        n.seat.by = null; n.seat = null; n.sitting = false; n.lounged = true;
        n.state = "seek"; n.timer = 0;
      }
      break;

    case "seek": {
      const ch = pickChair();
      if (!ch) {
        if (!n.lounged) { n.state = "toSofa"; break; }
        n.state = "toCounter"; n.timer = 0; break;
      }
      if (goTo(n, ch.x, ch.y)) { ch.by = n; n.chair = ch; n.state = "sitTable"; }
      else n.timer = 1.5;
      break;
    }
    case "sitTable": {
      const ch = n.chair;
      if (!ch) { n.state = "seek"; n.timer = 0; break; }
      snapSeat(n, ch, ch.dir);
      if (!ch.t.game) ch.t.game = n.pickedGame || rnd(GAMES);
      n.state = "play"; n.timer = ri(38, 80);
      break;
    }
    case "play": {
      if (!n.chair) { n.sitting = false; n.state = "seek"; n.timer = 0; break; }
      const t = n.chair.t;
      if (n.emoteT <= 0 && Math.random() < dt * .55) {
        const seated = t.chairs.filter(c => c.by).length;
        if (seated >= 2) { emote(n, rnd(["dice", "bang", "heart", "meeple", "note", "think"]));
          if (Math.random() < .35) t.rollT = 1.2; }
        else emote(n, rnd(["think", "coffee"]));
      }
      if (n.timer <= 0) {
        const t2 = n.chair.t;
        n.chair.by = null; n.chair = null; n.sitting = false;
        if (t2.chairs.every(c => !c.by)) t2.game = null;
        // 免费小店：不结账。一半人顺路去服务台还游戏 / 续杯，其余直接走
        n.state = Math.random() < .55 ? "toCounter" : "leave";
        n.timer = 0;
      }
      break;
    }
    case "toCounter": {
      const spot = COUNTER_SPOTS.find(q => !people.some(p => p.counterSpot === q)) || rnd(COUNTER_SPOTS);
      n.counterSpot = spot;
      if (goTo(n, spot.x, spot.y)) { n.state = "atCounter"; n.timer = ri(4, 9); }
      else { n.state = "leave"; n.timer = 0; }
      break;
    }
    case "atCounter":
      n.dir = "n";
      if (n.emoteT <= 0) emote(n, rnd(["coffee", "meeple", "note"]), 2.2);
      if (n.timer <= 0) { n.counterSpot = null; n.state = "leave"; n.timer = 0; emote(n, "heart", 3); }
      break;

    case "leave":
      if (!n.leaving) { n.leaving = true; if (!goTo(n, SPAWN.x, SPAWN.y)) n.leaving = "arrived"; }
      else if (n.role === "regular") { n.state = "away"; n.timer = ri(25, 70); }
      else n.dead = true;
      break;

    case "away":                                  // 熟客：出门溜达一圈再回来
      if (n.timer <= 0) {
        n.state = "enter"; n.timer = 1;
        n.leaving = false; n.lounged = false; n.pickedGame = null;
        n.px = SPAWN.x * TW + TW / 2; n.py = SPAWN.y * TW + TW - 2;
        n.dir = "s"; n.path = [];
        if (n.cap) n.hat = true;                  // 戴帽角色一直戴着
      }
      break;

    // 顾客状态机不认识的状态（多半是旧存档里存下来的，比如 "resident"）会让人卡死在原地：
    // 计时器一路减到负数也没有分支去改 state。兜底把人放回 enter。
    default:
      releaseSpot(n);
      n.state = "enter"; n.timer = ri(1, 3) / 2;
      break;
  }
}

// 放开占着的椅子 / 沙发位，回到能自由行动的状态
function releaseSpot(n) {
  if (n.chair) n.chair.by = null;
  if (n.seat) n.seat.by = null;
  (n.napSeats || []).forEach(s => (s.by = null));
  n.chair = null; n.seat = null; n.napSofa = null; n.napSeats = [];
  n.sitting = false; n.lying = false; n.path = [];
}

/* ── 睡沙发：店长和老墨共用 ── */
function lieDown(n) {                          // 已走到沙发前
  const s = n.napSofa;
  n.px = (s.x + s.len / 2) * TW;
  n.py = s.y * TW + TW - 1;
  n.dir = "w"; n.lying = true; n.sitting = false;
  // 店长睡整觉，老墨改成打盹：醒着翻游戏架的时间多一些
  n.task = "nap"; n.timer = n.role === "napper" ? ri(18, 36) : ri(45, 95);
}
function wakeUp(n) {
  n.napSeats.forEach(s => (s.by = null));
  n.napSeats = []; n.napSofa = null; n.lying = false;
  n.dir = "s";                                 // 躺姿是朝西的，起身别把侧脸留着
  n.px = Math.floor(n.px / TW) * TW + TW / 2;
  emote(n, "coffee", 3);
  n.task = "wake"; n.timer = 2.5;
}
function claimSofa(n) {                        // 占一张空的横排沙发
  const sofa = SOFAS.find(s => !s.vert && s.seats.every(q => !q.by));
  if (!sofa) return false;
  const f = FRONT[sofa.dir];
  const app = { x: sofa.seats[0].x + f[0], y: sofa.seats[0].y + f[1] };
  if (!walkable(app.x, app.y) || !goTo(n, app.x, app.y)) return false;
  sofa.seats.forEach(q => (q.by = n));
  n.napSofa = sofa; n.napSeats = sofa.seats.slice();
  n.task = "napGo"; n.timer = 0;
  return true;
}

/* 店长：大半时间躺沙发睡觉，偶尔起来巡桌 / 站柜台 */
function updateOwner(n, dt) {
  if (n.task === "napGo") { lieDown(n); return; }
  if (n.timer > 0) {
    if (n.lying) { if (n.emoteT <= 0 && Math.random() < dt * .12) emote(n, "note", 2.4); }
    else if (n.task === "check") { if (n.emoteT <= 0 && Math.random() < dt * .7) emote(n, rnd(["dice", "heart", "note", "meeple"])); }
    else if (n.task === "counter") {
      n.dir = "n";
      if (people.some(p => p.state === "atCounter") && n.emoteT <= 0 && Math.random() < dt) emote(n, "coffee", 1.8);
    }
    return;
  }
  if (n.lying) { wakeUp(n); return; }

  const busy = people.some(p => p.state === "atCounter");
  const r = Math.random();
  if (!busy && r < .72) { if (!claimSofa(n)) n.timer = 3; return; }
  if (r < .82) {
    const c = rnd(rnd(TABLES).chairs);
    if (goTo(n, c.x, c.y)) { n.task = "check"; n.timer = ri(5, 10); } else n.timer = 2;
  } else {
    if (goTo(n, STAFF_POST.x + 1, STAFF_POST.y)) { n.task = "counter"; n.timer = ri(6, 12); } else n.timer = 2;
  }
}

/* 老墨：不上班，几乎只睡，偶尔起来翻翻游戏架 */
function updateNapper(n, dt) {
  if (n.task === "napGo") { lieDown(n); return; }
  if (n.timer > 0) {
    if (n.lying) { if (n.emoteT <= 0 && Math.random() < dt * .10) emote(n, "cookie", 2.4); }
    else if (n.task === "browse") {
      if (n.browseAt) n.dir = flatDir(n.browseAt.dir);
      if (n.emoteT <= 0 && Math.random() < dt * .6) emote(n, rnd(["think", "meeple", "cookie"]));
    }
    return;
  }
  if (n.lying) { wakeUp(n); return; }

  const r = Math.random();
  if (r < .45) { if (!claimSofa(n)) n.timer = 4; return; }
  const s = pickShelfSpot();
  if (s && goTo(n, s.x, s.y)) { n.browseAt = s; n.task = "browse"; n.timer = ri(6, 13); }
  else n.timer = 3;
}

/* 程序员：长时间占一张桌敲电脑，偶尔起身续咖啡 */
function updateCoder(n, dt) {
  if (n.task === "sitDown") {                  // 已走到椅子上
    snapSeat(n, n.chair, n.chair.dir);
    n.task = "work"; n.timer = ri(70, 140);
    return;
  }
  if (n.timer > 0) {
    if (n.task === "work") {
      if (n.emoteT <= 0 && Math.random() < dt * .30) emote(n, rnd(["think", "bang", "note", "coffee"]));
    } else if (n.task === "refill") {
      n.dir = "n";
      if (n.emoteT <= 0 && Math.random() < dt * .8) emote(n, "coffee");
    }
    return;
  }
  if (n.sitting) {                             // 起身
    n.chair.by = null; n.chair = null; n.sitting = false;
    n.task = "stretch"; n.timer = 1.5;
    return;
  }
  if (n.task === "stretch") {                  // 去柜台续杯
    const spot = rnd(COUNTER_SPOTS);
    if (goTo(n, spot.x, spot.y)) { n.task = "refill"; n.timer = ri(5, 10); } else n.timer = 2;
    return;
  }
  const ch = pickChair();                      // 找张桌子坐下干活
  if (ch && goTo(n, ch.x, ch.y)) { ch.by = n; n.chair = ch; n.task = "sitDown"; n.timer = 0; }
  else n.timer = 3;
}

function updateStaff(n, dt) {
  if (n.timer > 0) {
    if (n.task === "counter") {
      n.dir = "n";
      if (people.some(p => p.state === "atCounter") && n.emoteT <= 0 && Math.random() < dt) emote(n, "coffee", 1.8);
    } else if (n.task === "check") {
      if (n.emoteT <= 0 && Math.random() < dt * .8) emote(n, rnd(["note", "heart", "dice"]));
    } else if (n.task === "stock") {
      if (n.stockDir) n.dir = flatDir(n.stockDir);
      if (n.emoteT <= 0 && Math.random() < dt * .8) emote(n, "meeple");
    }
    return;
  }
  const busy = people.some(p => p.state === "atCounter" || p.state === "toCounter");
  const roll = Math.random();
  if (busy) {
    // 有客到柜台：回岗，站到人走；各占一格别叠在一起（店长另占 +1）
    if (goTo(n, STAFF_POST.x + (n.postDX || 0), STAFF_POST.y)) { n.task = "counter"; n.timer = ri(4, 7); }
    else n.timer = 2;
  } else if (roll < .14) {
    // 空闲时偶尔回柜台瞄一眼，很快又走 —— 别杵着
    if (goTo(n, STAFF_POST.x + (n.postDX || 0), STAFF_POST.y)) { n.task = "counter"; n.timer = ri(2, 4); }
    else n.timer = 2;
  } else if (roll < .60) {
    const t = rnd(TABLES);
    const c = rnd(t.chairs);
    if (goTo(n, c.x, c.y)) { n.task = "check"; n.timer = ri(4, 8); }
    else n.timer = 2;
  } else {
    const s = pickShelfSpot();
    if (s && goTo(n, s.x, s.y)) { n.task = "stock"; n.stockDir = s.dir; n.timer = ri(5, 11); }
    else n.timer = 2;
  }
}

/* ══ 时间与光 ═════════════════════════════════════════ */
const DAY = 240;
let clock = 0;
function nightLevel() {
  const p = clock / DAY;
  if (p < .45) return 0;
  if (p < .62) return (p - .45) / .17 * .35;
  return .35 + Math.min(1, (p - .62) / .2) * .30;
}
function drawLight(night, time) {
  lx.clearRect(0, 0, NW, NH);
  if (night <= .02) return;
  lx.globalCompositeOperation = "source-over";
  lx.fillStyle = `rgba(22,28,56,${night})`;
  lx.fillRect(0, 0, NW, NH);
  lx.globalCompositeOperation = "destination-out";
  for (const l of LAMPS) {
    const cx = l.x * TW + 8, cy = l.y * TW;
    const r = 86 + Math.sin(time * 2 + l.x) * 3;
    const g = lx.createRadialGradient(cx, cy, 4, cx, cy, r);
    g.addColorStop(0, "rgba(0,0,0,.95)");
    g.addColorStop(.5, "rgba(0,0,0,.6)");
    g.addColorStop(1, "rgba(0,0,0,0)");
    lx.fillStyle = g; lx.beginPath(); lx.arc(cx, cy, r, 0, 7); lx.fill();
  }
  for (const [cx, cy] of [                            // 两台电视也各照亮一小片
    [(TV.x + TV.w / 2) * TW, TV.y * TW - 6],
    [TV2.x * TW, (TV2.y + TV2.h / 2) * TW],
  ]) {
    const r = 46;
    const g = lx.createRadialGradient(cx, cy, 2, cx, cy, r);
    g.addColorStop(0, "rgba(0,0,0,.7)"); g.addColorStop(1, "rgba(0,0,0,0)");
    lx.fillStyle = g; lx.beginPath(); lx.arc(cx, cy, r, 0, 7); lx.fill();
  }
  lx.globalCompositeOperation = "source-over";
}

/* ══ 尘埃 ═════════════════════════════════════════════ */
const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
const motes = Array.from({ length: reduce ? 0 : 34 }, () => ({
  x: Math.random() * NW, y: 40 + Math.random() * (NH - 80),
  s: .08 + Math.random() * .18, a: .1 + Math.random() * .25, ph: Math.random() * 6,
}));

/* ══ 存档：刷新后接着演 ═══════════════════════════════
   对象之间是互相引用的（人↔椅↔桌），存的时候一律换成下标。 */
const SAVE_KEY = "bbg-boardgame-v3";
const PERSON_KEYS = ["castKey", "name", "staff", "role", "build", "collar", "apron",
  "bag", "laptop", "cap", "hairStyle", "skin", "hair", "shirt", "pants", "style",
  "hat", "hatColor", "lashes", "glasses", "glassColor", "glassThin", "smallEyes", "bigEyes",
  "eyeColor", "hoodie", "inner", "firework", "starry", "robe", "eyebrow", "faceTaper", "spider", "mask", "ripped", "postDX",
  "eyeShadow", "skirt", "seed", "px", "py", "dir", "state", "timer", "emote", "emoteT",
  "sitting", "lying", "browseAt", "pickedGame", "lounged", "leaving", "task", "stockDir"];

function chairId(ch) {
  for (let t = 0; t < TABLES.length; t++) {
    const i = TABLES[t].chairs.indexOf(ch);
    if (i >= 0) return [t, i];
  }
  return null;
}
function seatId(s) {
  for (let k = 0; k < SOFAS.length; k++) {
    const i = SOFAS[k].seats.indexOf(s);
    if (i >= 0) return [k, i];
  }
  return null;
}
const chairOf = id => id && TABLES[id[0]] ? TABLES[id[0]].chairs[id[1]] : null;
const seatOf  = id => id && SOFAS[id[0]]  ? SOFAS[id[0]].seats[id[1]]  : null;

function saveState() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      v: 3, clock, spawnT,
      cat: { px: cat.px, py: cat.py, nap: cat.nap, dir: cat.dir, tail: cat.tail, path: cat.path },
      tables: TABLES.map(t => ({ game: t.game, rollT: t.rollT })),
      people: people.map(n => {
        const o = {};
        for (const k of PERSON_KEYS) o[k] = n[k];
        o.path = n.path;
        o.chair = n.chair ? chairId(n.chair) : null;
        o.seat = n.seat ? seatId(n.seat) : null;
        o.napSofa = n.napSofa ? SOFAS.indexOf(n.napSofa) : -1;
        o.napSeats = (n.napSeats || []).map(seatId).filter(Boolean);
        o.counterSpot = n.counterSpot ? COUNTER_SPOTS.indexOf(n.counterSpot) : -1;
        return o;
      }),
    }));
  } catch (e) { /* 无痕模式 / 存储被禁用时静默降级 */ }
}

function loadState() {
  let d;
  try { d = JSON.parse(localStorage.getItem(SAVE_KEY) || "null"); } catch (e) { return false; }
  if (!d || d.v !== 3 || !Array.isArray(d.people) || !d.people.length) return false;
  clock = typeof d.clock === "number" ? d.clock : 0;
  spawnT = typeof d.spawnT === "number" ? d.spawnT : 1;
  if (d.cat) Object.assign(cat, d.cat);
  (d.tables || []).forEach((t, i) => {
    if (TABLES[i]) { TABLES[i].game = t.game || null; TABLES[i].rollT = t.rollT || 0; }
  });
  TABLES.forEach(t => t.chairs.forEach(c => (c.by = null)));
  SOFAS.forEach(s => s.seats.forEach(q => (q.by = null)));
  people.length = 0;
  for (const o of d.people) {
    const n = makePerson(o.castKey && CAST[o.castKey] ? o.castKey : null);
    for (const k of PERSON_KEYS) if (o[k] !== undefined) n[k] = o[k];
    n.path = Array.isArray(o.path) ? o.path : [];
    if (n.castKey) {                          // 外观永远听 CAST 的，方便随时改形象
      const c = CAST[n.castKey], look = makePerson(n.castKey);
      for (const k of ["name", "role", "staff", "build", "collar", "apron", "bag",
                       "laptop", "cap", "hairStyle", "skin", "hair", "shirt", "pants",
                       "style", "lashes", "glasses", "glassColor", "glassThin", "smallEyes", "bigEyes",
                       "eyeColor", "hoodie", "inner", "firework", "starry", "robe", "eyebrow", "faceTaper", "spider", "mask", "ripped", "postDX", "eyeShadow", "skirt", "hatColor"]) n[k] = look[k];
      n.hat = !!c.cap;                            // 帽子只认 CAST 设定（白白恒戴，其余常驻不戴）
      n._hairHi = null; n._hairSh = null;
    }
    n.chair = chairOf(o.chair);
    n.seat = seatOf(o.seat);
    n.napSofa = o.napSofa >= 0 ? SOFAS[o.napSofa] : null;
    n.napSeats = (o.napSeats || []).map(seatOf).filter(Boolean);
    n.counterSpot = o.counterSpot >= 0 ? COUNTER_SPOTS[o.counterSpot] : null;
    if (n.chair) n.chair.by = n;
    if (n.seat) n.seat.by = n;
    n.napSeats.forEach(s => (s.by = n));
    people.push(n);
  }
  // 存档是老版本存的，里面不会有后来新加的常驻角色 —— 补齐，别让人凭空消失
  for (const r of RESIDENTS)
    if (!people.some(p => p.castKey === r[0])) spawnResident(...r);
  // 没人坐的桌子不该还摆着游戏
  TABLES.forEach(t => { if (t.chairs.every(c => !c.by)) t.game = null; });
  return true;
}

/* ══ 主循环 ═══════════════════════════════════════════ */
// 四位常驻角色
function spawnResident(key, tx, ty, task) {
  const n = makePerson(key);
  n.px = tx * TW + TW / 2; n.py = ty * TW + TW - 2;
  // 熟客走的是顾客状态机，得从 enter 起步；有专属行为的角色才用 resident 占位
  n.state = n.role === "regular" ? "enter" : "resident";
  n.timer = 0; n.task = task;
  people.push(n);
  return n;
}
const RESIDENTS = [
  ["haley",  18, 17, ""],
  ["owner",  SOFAS[0].x + 2, SOFAS[0].y + 1, "wake"],
  ["mo",     25, 15, "wake"],
  ["coder",  20, 17, "stretch"],
  ["bear",   STAFF_POST.x, STAFF_POST.y, "counter"],
  ["rabbit", STAFF_POST.x - 1, STAFF_POST.y, "counter"],
  ["baibai", STAFF_POST.x + 1, STAFF_POST.y, "counter"],
  ["lanwen", 30, 15, ""],
  ["yanhua", 25, 16, ""],
  ["liangzi", 30, 16, ""],
  ["lige",   35, 16, ""],
  ["kk",     20, 15, ""],
  ["lulu",   37, 16, ""],
];
RESIDENTS.forEach(r => spawnResident(...r));

let spawnT = .5, last = performance.now() / 1000, time = 0;

// 有存档就接着演，没有就当作新开张（上面初始化的店员与店长保留）
loadState();

let saveT = 0;
try {
  addEventListener("pagehide", saveState);
  addEventListener("visibilitychange", () => {
    if (typeof document !== "undefined" && document.visibilityState === "hidden") saveState();
  });
} catch (e) { /* 无事件环境下跳过 */ }

// 可点热区：点地形图放大 dx.jpg；点墙上挂画依次放大 wall1→wall2，末张后关闭。带缩放动画，Esc/点覆盖层关闭
try {
  const screenEl = view.parentElement || document.querySelector(".screen");
  const overlay = document.createElement("div");
  overlay.className = "mapzoom";
  const img = document.createElement("img");
  overlay.appendChild(img);
  screenEl.appendChild(overlay);

  const HOTSPOTS = [
    { rect: MAP, imgs: ["photo/dx.jpg"] },
    { rect: WALLPIC, imgs: ["photo/wall1.jpg", "photo/wall2.jpg"] },
  ];
  const worldXY = (cx, cy) => {
    const r = view.getBoundingClientRect();
    return [(cx - r.left) / r.width * NW, (cy - r.top) / r.height * NH];
  };
  const inRect = (rc, wx, wy) => wx >= rc.x * TW && wx < (rc.x + rc.w) * TW && wy >= rc.y * TW && wy < (rc.y + rc.h) * TW;

  let cur = null, idx = 0;
  const show = src => {                         // 重置再加 show，让每次都重播缩放动画
    img.src = src; overlay.classList.remove("show"); void overlay.offsetWidth; overlay.classList.add("show");
  };
  const close = () => { overlay.classList.remove("show"); cur = null; };
  const inImgCenter = (cx, cy) => {             // 点是否落在当前图片的中间区域（中央 50%）
    const r = img.getBoundingClientRect();
    return Math.abs(cx - (r.left + r.width / 2)) < r.width * .25 &&
           Math.abs(cy - (r.top + r.height / 2)) < r.height * .25;
  };

  overlay.addEventListener("click", e => {
    if (!cur) return close();
    // 有下一张且点在图片中间 → 前进；否则关闭
    if (idx < cur.imgs.length - 1 && inImgCenter(e.clientX, e.clientY)) { idx++; show(cur.imgs[idx]); }
    else close();
  });
  view.addEventListener("click", e => {
    if (overlay.classList.contains("show")) return;   // 打开时交给覆盖层处理
    const [wx, wy] = worldXY(e.clientX, e.clientY);
    const hs = HOTSPOTS.find(h => inRect(h.rect, wx, wy));
    if (hs) { cur = hs; idx = 0; show(hs.imgs[0]); }
  });
  view.addEventListener("mousemove", e => {
    const [wx, wy] = worldXY(e.clientX, e.clientY);
    view.style.cursor = HOTSPOTS.some(h => inRect(h.rect, wx, wy)) ? "zoom-in" : "default";
  });
  addEventListener("keydown", e => { if (e.key === "Escape") close(); });
} catch (e) { /* 无 DOM 环境（如离屏渲染工具）下跳过 */ }

function frame(now) {
  now /= 1000;
  const dt = Math.min(.05, now - last); last = now;
  time += dt; clock = (clock + dt) % DAY;
  const night = nightLevel();

  const p = clock / DAY;
  const rate = p < .1 ? 8 : p < .55 ? 5 : p < .8 ? 6.5 : 15;
  const cap = p < .85 ? 16 : 7;
  spawnT -= dt;
  if (spawnT <= 0) {
    spawnT = rate * (.6 + Math.random() * .8);
    if (people.filter(x => !x.staff).length < cap) people.push(makePerson());
  }

  updateGang(dt);
  for (const n of people) update(n, dt, time);
  for (let i = people.length - 1; i >= 0; i--) if (people[i].dead) people.splice(i, 1);
  for (const t of TABLES) if (t.rollT > 0) t.rollT -= dt;
  updateCat(dt);

  saveT += dt;
  if (saveT >= 2) { saveT = 0; saveState(); }

  /* ---- 绘制 ---- */
  sx.drawImage(floorTex, 0, 0);
  drawOuterWalls(sx, night, time);

  const items = [];
  shelves.forEach(s => items.push({ y: s.y * TW + TW, d: c => drawShelf(c, s) }));
  wallShelves.forEach(s => items.push({ y: (s.y + s.h) * TW, d: c => drawWallShelf(c, s) }));
  IWALL_V.forEach(w => items.push({ y: (w.y + w.h) * TW, d: c => drawIWallV(c, w) }));
  IWALL_H.forEach(w => items.push({ y: (w.y + 1) * TW, d: c => drawIWallH(c, w) }));
  PILLARS.forEach(pl => items.push({ y: (pl.y + pl.h) * TW, d: c => drawPillar(c, pl) }));
  TABLES.forEach(t => {
    t.chairs.forEach(ch => items.push({ y: ch.y * TW + TW - 1, d: c => drawChair(c, ch) }));
    items.push({ y: (t.y + t.h) * TW, d: c => drawTable(c, t, time) });
  });
  SOFAS.forEach(s => items.push({ y: (s.y + s.h) * TW - 2, d: c => drawSofa(c, s) }));
  items.push({ y: (TV.y + 1) * TW, d: c => drawTV(c, time) });
  items.push({ y: (TV2.y + TV2.h) * TW, d: c => drawTVWall(c, time) });
  items.push({ y: (MAP.y + MAP.h) * TW, d: c => drawTerrainMap(c, time) });
  items.push({ y: (WALLPIC.y + WALLPIC.h) * TW + 2, d: c => drawWallHint(c, time) });
  items.push({ y: (counter.y + 1) * TW, d: c => drawCounter(c, time) });
  PLANTS.forEach(pl => items.push({ y: pl.y * TW + TW, d: c => drawPlant(c, pl, time) }));
  people.forEach(n => {
    if (n.state === "away") return;                 // 不在店里
    // 坐着的人必须排在自己那把椅子之后，否则会被椅背挡住
    let sy = n.py;
    if (n.sitting && n.chair) sy = n.chair.y * TW + TW - .5;
    // 竖排沙发的靠背在两侧不在身后，坐者要整体压在沙发之后画，否则会被沙发挡住
    else if (n.sitting && n.seat) sy = n.seat.sofa && n.seat.sofa.vert
      ? (n.seat.sofa.y + n.seat.sofa.len) * TW + 1
      : n.seat.y * TW + TW - .5;
    else if (!n.lying) {
      // 站在桌子占地范围里的人（刚从上排椅子起身 / 绕桌走）要画在桌子之前，否则腿被桌面挡没
      for (const t of TABLES) {
        if (n.px >= t.x * TW && n.px < (t.x + t.w) * TW &&
            n.py >= t.y * TW - 8 && n.py <= (t.y + t.h) * TW)
          sy = Math.max(sy, (t.y + t.h) * TW + 2);
      }
    }
    items.push({ y: sy, d: c => drawPerson(c, n, time) });
    // 电脑要排在桌子之后才会落在桌面上（用人物的排序键会被桌子盖住）
    if (n.laptop && n.sitting && n.chair)
      items.push({ y: (n.chair.t.y + n.chair.t.h) * TW + .1, d: c => drawSeatedLaptop(c, n, time) });
  });
  items.push({ y: cat.py, d: c => drawCat(c, time) });

  items.sort((a, b) => a.y - b.y);
  for (const it of items) it.d(sx);

  drawVoid(sx);
  LAMPS.forEach(l => drawLamp(sx, l));

  // 电视洒在地毯上的冷光
  {
    const cx = (TV.x + TV.w / 2) * TW, cy = TV.y * TW - 4;
    const flick = .5 + Math.abs(Math.sin(time * 3.3)) * .22;
    sx.globalCompositeOperation = "lighter";
    const g = sx.createRadialGradient(cx, cy, 2, cx, cy, 60);
    g.addColorStop(0, `rgba(110,175,215,${.16 * flick})`);
    g.addColorStop(1, "rgba(110,175,215,0)");
    sx.fillStyle = g; sx.beginPath(); sx.arc(cx, cy, 60, 0, 7); sx.fill();
    sx.globalCompositeOperation = "source-over";
  }

  for (const m of motes) {
    m.x += Math.sin(time * .6 + m.ph) * .15 + .06;
    m.y -= m.s * .3;
    if (m.y < 36) { m.y = NH - 30; m.x = Math.random() * NW; }
    if (m.x > NW) m.x = 0;
    sx.fillStyle = `rgba(255,236,200,${m.a * (1 - night * .4)})`;
    sx.fillRect(Math.round(m.x), Math.round(m.y), 1, 1);
  }

  drawLight(night, time);
  if (night > .02) sx.drawImage(lightC, 0, 0);
  if (night > .05) {
    sx.globalCompositeOperation = "lighter";
    for (const l of LAMPS) {
      const cx = l.x * TW + 8, cy = l.y * TW, r = 64;
      const g = sx.createRadialGradient(cx, cy, 1, cx, cy, r);
      g.addColorStop(0, `rgba(255,196,110,${.18 * night})`);
      g.addColorStop(1, "rgba(255,196,110,0)");
      sx.fillStyle = g; sx.beginPath(); sx.arc(cx, cy, r, 0, 7); sx.fill();
    }
    sx.globalCompositeOperation = "source-over";
  }
  if (night < .3) {
    sx.globalCompositeOperation = "lighter";
    for (const wx of [4, 16, 24]) {
      sx.fillStyle = `rgba(255,226,160,${.05 * (1 - night / .3)})`;
      sx.beginPath();
      sx.moveTo(wx * TW, 32); sx.lineTo(wx * TW + TW * 3, 32);
      sx.lineTo(wx * TW + TW * 3 + 44, 148); sx.lineTo(wx * TW + 44, 148);
      sx.closePath(); sx.fill();
    }
    sx.globalCompositeOperation = "source-over";
  }
  drawTitleBlock(sx, time);

  const vg = sx.createRadialGradient(NW / 2, NH / 2, NH * .42, NW / 2, NH / 2, NH * 1.0);
  vg.addColorStop(0, "rgba(0,0,0,0)"); vg.addColorStop(1, "rgba(20,14,8,.32)");
  sx.fillStyle = vg; sx.fillRect(0, 0, NW, NH);

  vctx.imageSmoothingEnabled = false;
  vctx.drawImage(scene, 0, 0, NW, NH, 0, 0, NW * SCALE, NH * SCALE);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
})();
</script>
